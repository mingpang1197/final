# 형사판결 — 이지리드 작성 규칙
# 가이드북 II. 형사판결서 — 가. 주문(결론) + 나. 이유(1~5)
# 민사·가사·행정과 동일하게 단일 파일

doc_type: criminal
section_label: 형사판결
section_order:
- conclusion
- reasons_intro
- criminal_facts
- evidence_summary
- law_application
- claims_judgment
- sentencing_reasons
sections:
  conclusion:
    heading: <이 판결의 결론>
    avoid_terms:
    - 주문
    - 주문의 내용
    placement: 이지리드 기재 부분 중 가장 앞에 기재
    rules:
    - 장애인 등이 '주문'이라는 용어를 이해하기 어려우므로 '<이 판결의 결론>' 등으로 기재
    phrase_rules:
    - match:
      - 징역
      - 금고
      write: 감옥에 {기간} 있어야 합니다
      note: 예시 (1) — 1개 형 선고 (집행유예 없음)
    - match:
      - 집행을 유예
      - 집행유예
      pattern: imprisonment
      write: '1) {이름}은 죄가 있으므로 원래 {징역기간} 감옥에 있어야 하지만, 지금은 감옥에 가지 않습니다.

        2) 앞으로 {유예기간} 동안 {이름}이 어떻게 지내는지 살펴봅니다.

        3) {유예기간} 안에 다른 죄를 지어 감옥에 가면, 여기서 정한 {징역기간}도 더하여 감옥에 갇혀야 합니다.

        4) {유예기간} 동안 다른 죄를 짓지 않으면, 이 사건 때문에 감옥에 가지 않습니다.

        '
      note: 징역형의 집행유예
    - match:
      - 벌금
      - 집행을 유예
      write: '1) {이름}은 죄를 지었으므로 원래 벌금 {금액}을 내야 하지만, 지금은 벌금을 내지 않습니다.

        2) 앞으로 {유예기간} 동안 {이름}이 어떻게 지내는지 살펴봅니다.

        3) {유예기간} 안에 다른 죄를 지어 감옥에 가면, 여기서 정한 벌금 {금액}도 내야 합니다.

        4) {유예기간} 동안 다른 죄를 짓지 않으면, 벌금을 내지 않습니다.

        '
      note: (6) 벌금형의 집행유예
    - match:
      - 사회봉사
      write: '1) {이름}은 벌로 봉사활동을 {시간}시간 해야 합니다.

        2) 만약 {이름}이 {기한} 안에 봉사활동을 다하지 않으면, 감옥에 갈 수 있습니다.

        '
      note: (7) 사회봉사 — 집행유예와 함께 선고 시 기한=유예기간
    - match:
      - 보호관찰
      write: '{이름}은 {기간} 동안 보호관찰을 받아야 합니다. 이런 뜻입니다.

        1) 감옥 대신 평소처럼 살되, 보호관찰관의 지시를 따라야 합니다.

        2) 판결이 확정*되면 10일 안에 판결문을 가지고 보호관찰소에 가야 합니다.

        3) *확정: 더 이상 결과를 바꿀 수 없음.

        4) 보호관찰관의 말을 따르지 않으면 감옥에 갈 수 있습니다.

        '
      note: (8) 보호관찰
    - match:
      - 형의 선고를 유예
      - 선고유예
      write: '{이름}은 죄를 지었으므로 원래 {형종·금액}을 {처분}해야 하지만, 지금은 {처분}하지 않습니다.

        앞으로 {유예기간} 동안 {이름}이 어떻게 지내는지 살펴봅니다.

        {유예기간} 안에 다른 죄를 지으면, {형종·금액}을 {처분}해야 합니다.

        ({유예기간} 동안 다른 죄를 짓지 않으면 {형종}은 없어집니다.)

        '
      note: (9) 선고유예 — 집행유예와 다름
    - match:
      - 배상명령
      - 지급하라
      write: '{피고인}은 {피해자}에게 {범죄명}으로 받은 돈 {금액}을 당장 돌려줘야 합니다.'
      note: (10) 배상명령 — '가집행' 부분은 이지리드에서 생략
    - match:
      - 징역
      - 금고
      pattern: multiple_counts
      write: '각 죄마다 ''○○죄를 지었으므로, 감옥에 N개월/년 있어야 합니다''로 나누고

        마지막에 ''전부 합하여 감옥에 ○○ 있어야 합니다''로 합산 기재

        '
      note: 예시 (2) — 2개 형 선고
    - match:
      - 벌금
      write: 벌금 {금액}을 내야 합니다
      note: (2) 벌금
    - match:
      - 노역장
      - 유치
      write: 벌금을 안 내면, 나라에서 {이름}을 감옥으로 보낼 수 있습니다
      note: (2) 노역장유치 1단계
    - match:
      - 환산
      - 노역장
      write: '감옥에 가면 하루에 {일당}씩을 벌금에서 뺍니다.

        {이름}은 남은 벌금이 0원이 될 때 감옥에서 나옵니다.

        '
      note: (2) 노역장유치 2단계
    - match:
      - 가납
      write: 별도 '가납' 문장을 만들지 않고, 1번 벌금 납부 지시에 통합 (가납=벌금 상당액 선납)
      note: (2) 가납 — 벌금 부분과 결합 기재
    - match:
      - 몰수
      write: '{이름}은 {물건}을 가지고 있었습니다.

        경찰이 이 {물건}을 가져갔습니다.

        이 {물건}은 {이름}에게 돌려주지 않습니다.

        '
      note: (3) 몰수 — 3단계 서술
    - match:
      - 추징
      write: 범죄로 얻은 {금액/물건}을 {이름}에게서 받아냅니다
      note: (3) 추징 — 예시 추가 시 보완
    - match:
      - 피해자
      - 환부
      write: '{피고인}은 {물건}을 가지고 있었습니다.

        경찰이 이 {물건}을 가져갔습니다.

        (위조·변조 부분이 있으면) {피고인}이 함부로 고친 부분을 지웁니다.

        이 {물건}은 {피해자}에게 **돌려줍니다**.

        '
      note: 피해자환부 — 원래 물건 반환 → '돌려줍니다'
    - match:
      - 피해자
      - 교부
      write: '{피고인}은 {물건}을 가지고 있었습니다.

        경찰이 이 {물건}을 가져갔습니다.

        이 {물건}은 {피해자}에게 **줍니다** (돌려주지 않음).

        {교부 이유 — 범죄로 얻은 돈으로 산 물건 등} 설명을 반드시 추가.

        '
      note: 피해자교부 — '줍니다' + 이유 설명
    - match:
      - 무죄
      write: '{피고인}은 {해당 행위}하지 않았습니다. **무죄입니다.**'
      note: (11) 무죄 — '죄가 없습니다' ❌ → '무죄입니다' ✅
    - match:
      - 공소기각
      - 면소
      - 형의 면제
      - 형면제
      write: '{피고인}이 {대상}에게 {행위}한 것을 **처벌하지 않습니다.**'
      note: (12) 면제·면소·공소기각 → 통일 표현
  fine_workhouse:
    heading: <벌금·노역장유치·가납>
    rules:
    - '벌금형은 ''벌금 ○○을 내야 합니다''로 기재 (예: 5,000,000원 → 500만 원)'
    - 벌금에 관련된 가납명령·노역장유치는 벌금 문장 바로 뒤에 **결합적으로** 기재
    - 통상 판결 주문의 기재 순서에 엄격히 얽매이지 않아도 됨
    - '''노역장유치'' → ''감옥으로 보낼 수 있습니다'' 등 쉬운 표현 사용'
    - 가납명령은 '가납' 용어 대신, 벌금 납부 지시(1번)에 **통합**하여 기재
    avoid_terms:
    - 노역장유치
    - 가납명령
    - 환산한 기간
    - 유치
  forfeiture:
    heading: <몰수·추징>
    rules:
    - 몰수는 이미 경찰이 압수한 물건에 대해 선고 — '누구로부터 몰수'보다 **돌려받지 못한다**는 사실에 집중
    - '''몰수''·''압수''·''증 제○호'' 대신: 가지고 있었음 → 경찰이 가져감 → 돌려주지 않음'
    - 물건은 시각자료(그림)와 함께 기재
    - 추징은 범죄로 얻은 이익 환수 — 별도 예시 추가 예정
    avoid_terms:
    - 몰수
    - 압수
    - 증 제
    - 추징
  victim_return_delivery:
    heading: <피해자환부·피해자교부>
    rules:
    - '**피해자환부**: 원래 빼앗긴 물건을 되돌려 주는 것 → **''돌려줍니다''** 사용'
    - '**피해자교부**: 범죄로 얻은 돈 등으로 산 물건을 피해자에게 주는 것 → **''줍니다''** 사용 (돌려줍니다 ❌)'
    - '피해자교부는 **왜 주는지** 이유를 반드시 설명 (예: 훔친 물건을 팔아 산 돈으로 산 휴대폰)'
    - '**폐기**는 일부 몰수 — 위조·변조한 부분을 지운 뒤 나머지를 환부'
    - '생소한 물건명(약속어음 등)은 한 줄 정의 추가 (예: ''나중에 돈을 주겠다고 약속하는 종이'')'
    - '공통 흐름: 피고인 소유 → 경찰 압수 → (폐기 시 일부 제거) → 피해자에게 돌려줌/줌'
    avoid_terms:
    - 피해자환부
    - 피해자교부
    - 폐기
    - 증 제
  suspended_execution:
    heading: <징역형·벌금형의 집행유예>
    rules:
    - '**집행유예**: 형을 선고했지만 당장 실행하지 않고, 일정 기간 지켜본 뒤 실행 여부 결정'
    - '**선고유예**와 다름 — 집행유예는 형 선고 + ''집행 유예''가 한 쌍'
    - '**징역형**: 당장 감옥 안 감 → 유예기간 관찰 → 재범 시 형 집행 / 미재범 시 면제'
    - '**벌금형**: 당장 벌금 안 냄 → 유예기간 관찰 → 재범(감옥) 시 벌금 납부 / 미재범 시 **벌금 면제**'
    - 벌금형 집행유예는 징역형보다 이해하기 어려움 — 반드시 4단계로 풀어 설명
    - '''집행유예''·''형의 집행을 유예''·''판결 확정일'' 등 용어 사용 금지'
    - '시각자료(징역): 감옥 X + 유예기간 타임라인 / (벌금): 벌금 X + 유예기간 + 재범 시 납부'
    avoid_terms:
    - 집행유예
    - 형의 집행을 유예
    - 판결 확정일
  community_service:
    heading: <사회봉사>
    rules:
    - '''사회봉사'' → ''벌로 봉사활동'' 등 쉬운 표현'
    - '집행유예와 함께 선고된 경우, 미이행 시 감옥 가능 — **유예기간(예: 2년) 안에** 완료해야 함'
    - '시각자료: 봉사활동 그림(청소·페인트·배달 등)'
    avoid_terms:
    - 사회봉사
    - 명한다
  probation:
    heading: <보호관찰>
    rules:
    - 보호관찰 = 감옥 대신 사회에서 생활하며 보호관찰관 지시 따름
    - 판결 **확정** 후 **10일 이내** 관할 보호관찰소 방문·판결문 지참
    - '''확정''은 한 줄로 쉽게 설명 (더 이상 결과 변경 불가)'
    - 불이행 시 감옥 가능 — 반드시 명시
    - '집행유예와 함께 선고 시 보호관찰 **기간**(예: 2년) 명시'
    - '시각자료: 보호관찰소·보호관찰관'
    avoid_terms:
    - 보호관찰
    - 관할
  suspended_sentence:
    heading: <선고유예>
    rules:
    - '**선고유예**: 형 선고 자체를 유예 — **집행유예**(형 선고 + 집행 유예)와 **다름**'
    - '벌금 100만 원 선고유예 예: 지금 벌금 안 냄 → 2년 관찰 → 재범 시 벌금 / 미재범 시 면제'
    - 형의 종류·금액은 판결 다른 부분과 함께 읽어야 함 (주문에 금액 없을 수 있음)
    - '''형의 선고를 유예''·''선고유예'' 용어 사용 금지'
    - '시각자료(벌금): 벌금 X 표시 + 유예기간'
    avoid_terms:
    - 선고유예
    - 형의 선고를 유예
  restitution_order:
    heading: <배상명령>
    rules:
    - 피고인이 피해자(배상신청인)에게 **범죄로 받은 돈** 등을 **당장 돌려줘야** 함
    - 500,000원 → 50만 원 등 쉬운 금액 표기
    - '범죄 유형을 쉬운 말로 (예: 편취금 → 사기로 받은 돈)'
    - '**''위 명령은 가집행할 수 있다''** — 집행권원 문제이므로 **이지리드에서 생략**'
    avoid_terms:
    - 배상명령
    - 배상신청인
    - 가집행
    - 편취금
  acquittal:
    heading: <무죄>
    rules:
    - '**''무죄입니다''** 사용 (''죄가 없습니다'' ❌ — 이해하기 더 쉬움)'
    - '해당 죄명·행위를 쉬운 말로 먼저 설명 (예: 절도 → 물건을 훔치지 않았습니다)'
    - '**기재 순서**: 유죄 부분의 부수처분·배상명령을 **먼저** 기재한 뒤, 무죄·면소·공소기각 부분을 **별도** 기재'
    - '시각자료: 무죄 판결 그림(법槌·무죄)'
    avoid_terms:
    - 죄가 없습니다
    - 공소사실
  non_punishment:
    heading: <형의 면제·면소·공소기각>
    rules:
    - 법률상 성격은 다르지만, 피고인·피해자 입장에서는 **처벌하지 않음**으로 동일
    - 형의 면제·면소·공소기각 → 모두 **'처벌하지 않습니다'** 로 통일
    - 처벌하지 않는 **이유**는 상대적으로 중요도 낮음 — 쉬운 말로 행위만 설명
    - '시각자료: 벌금 X + 감옥 X'
    avoid_terms:
    - 공소기각
    - 면소
    - 형의 면제
    - 형면제
  reasons_intro:
    heading: <이런 결론을 내린 이유>
    avoid_terms:
    - 이유
    - 양형의 이유
    - 판단의 요지
    placement: 주문(결론) 다음에 기재
    rules:
    - 판결문 '이유' 부분은 **'<이런 결론을 내린 이유>'** 등으로 제목을 바꿔 기재
    - '아래 (1)~(5) 순서: 범죄사실 → 증거의 요지 → 법령의 적용 → 주장·쟁점 판단 → **양형의 이유**'
    phrase_rules: []
  criminal_facts:
    heading: <범죄사실>
    avoid_terms:
    - 범죄사실
    - 공소사실
    - 범행
    - 피고인은
    rules:
    - '**시작 문구**: ''{피고인}이 저지른 범죄는 이렇습니다.'' (번호 1.)'
    - 행위 설명을 쉽게 하려면 **날짜·시간 → 장소 → 행위** 순으로 **앞에 따로** 적기
    - '날짜·시간: ''2023년 2월 17일 저녁 8시 정도''처럼 구체적이되 쉬운 표현'
    - '장소: 병원·학교 등 익숙한 장소명으로 (예: △△대학교병원 응급실 원무과)'
    - '행위: 죄명·법률 용어 대신 **누가·무엇으로·누구의 어디를·몇 번** 했는지 (예: 맥주병으로 이마를 1번 때렸습니다)'
    - '시각자료: 범행 행위 그림(피고인·피해자·도구)'
    phrase_rules:
    - match:
      - 범죄사실
      - 공소사실
      write: '1. {피고인}이 저지른 범죄는 이렇습니다.

        · 날짜·시간: {날짜} {시간}

        · 장소: {장소}

        · {피고인}은 {도구·방법}으로 {피해자}의 {신체 부위}를 {횟수}번 {행위}했습니다.

        '
      note: (1) 범죄사실 — 날짜·장소·행위 분리
  evidence_summary:
    heading: <증거의 요지>
    avoid_terms:
    - 증거의 요지
    - 증거능력
    - 증명력
    - 진술의 일관성
    rules:
    - '**시작 문구**: ''2. 유죄라는 증거는 이렇습니다.'' (유죄 판결 시)'
    - '**자백이 있는 경우**: 증거를 하나씩 나열 (1) 자백 2) 사진·진단서 등). 상세 요지는 덜 중요'
    - '**부인하나 유죄인 경우**: 원문 판결문에 이미 상세 설명 → 이지리드는 **생략하거나 매우 짧게**'
    - '부인+유죄 요약형: ''{증인들}의 이야기, {진단서}, {현장사진} 등을 함께 보면, {피고인}이 {행위}한 것이 맞습니다.'''
    - 증거 항목은 **1) 2)** 번호로 나열, 각 항목은 한 문장
    - '시각자료: 자백(법정·''제가 했습니다'') / 상해 사진 / 진단서'
    phrase_rules:
    - match:
      - 자백
      - 인정
      write: 1) {피고인}은 자기가 {행위}한 것이 맞다고 합니다.
      note: (2) 증거 — 자백. LEGAL_DB('범죄 사실을 자백', image_215) 매칭 시 DB 우선
    - match:
      - 상해진단서
      - 진단서
      write: 진단서가 있습니다.
      note: LEGAL_DB('증거(진단서)', image_075) 매칭 시 DB 우선
    - match:
      - 사진
      - 촬영
      write: '{피해자}이 맞아서 멍든 사진이 있습니다.'
      note: LEGAL_DB('증거(사진)', image_076) 매칭 시 DB 우선
    - match:
      - 부인
      - 증거에 의하여
      write: '{증인·진술 목록}, {진단서}, {현장사진} 등 여러 가지를 함께 보면,

        {피고인}이 {피해자}를 {행위}해 상처를 입힌 것이 맞습니다.

        '
      note: '(2) 증거 — 부인+유죄: 짧은 종합 문장'
  law_application:
    heading: <법령의 적용>
    avoid_terms:
    - 법령의 적용
    - 적용법조
    - 죄질
    rules:
    - 법조문만 나열하면 비전문가가 이해하기 어려움 → **단순 나열은 생략·축약** 가능
    - '**예외(반드시 기재)**: **심신미약**(형법 제10조)·**농아자**(형법 제11조)로 형이 **감경**된 경우 — 결과에 큰 영향, 피고인에게 중요'
    - 법령 적용 자체가 쟁점이면 상세 기재; 그렇지 않으면 청구취지 판단 등 다른 부분에 언급된 것으로 충분
    - '**청구취지 판단·양형이유 등 다른 부분과 중복 기재 금지**'
    - '시각자료: 심신미약(범죄? 물음표) / 농아(귀 X 아이콘)'
    phrase_rules:
    - match:
      - 형법
      - 적용
      - 법에 정한
      write: 3. {피고인}을 {죄명}에 해당하는 법(형법 제{조문}조 등)에 정한 대로 처벌합니다.
      note: (3) 법령 적용만 — 조문 나열형
    - match:
      - 형법 제10조
      - 심신미약
      - 사물변별능력
      - 의사결정능력
      write: '3. 형법 제10조에 따라 {피고인}을 **약하게** 처벌합니다.

        {피고인}은 {장애·상태}를 가지고 있습니다. 어떤 행동이 범죄인지를 잘 모릅니다.

        {피고인}은 잘 몰라서 범죄를 저질렀으므로 약하게 처벌합니다.

        '
      note: (3) 심신미약 감경. LEGAL_DB(심신미약 image_203·204) 매칭 시 DB 우선
    - match:
      - 형법 제11조
      - 농아
      write: '3. 형법 제11조에 따라 {피고인}을 **약하게** 처벌합니다.

        {피고인}은 농아인입니다. 그래서 약하게 처벌합니다.

        '
      note: (3) 농아자 감경. LEGAL_DB(청각장애 image_275) 참고
  claims_judgment:
    heading: <피고인 또는 변호인의 주장·쟁점에 대한 판단>
    avoid_terms:
    - 피고인의 주장에 대한 판단
    - 쟁점
    - 심신상실
    - 사물변별능력
    - 의사결정능력
    rules:
    - 독자는 이 부분을 **정확히 이해하고 싶어 함** — 이지리드에 **반드시 포함** (설문에서 이해도 크게 상승)
    - '**소제목에 결론을 직접** 넣기 (예: ''4. 김을수가 때려서 상처 입힌 것이 맞습니다.'')'
    - '**2단 구조**: 1) ''{피고인}은 이렇게 말합니다.'' (주장) → 2) 법원 결론 + 이유 ①②③'
    - '(가) **부인 주장**: 피고인 주장을 쉬운 말로 요약 → ''그래도/하지만 {결론}'' + 증거별 이유 나열'
    - '(나) **심신장애 주장**: 장애인 사건에서 자주 등장 — **심신상실(무죄) 기각** vs **심신미약(약하게 처벌) 인정** 구분'
    - '심신상실 기각: ''{질병}이 있지만, {피고인}을 처벌합니다'' — 질병 **때문에** 범죄한 것이 **아님**'
    - '심신미약 인정: ''{장애}가 있으므로, {피고인}을 약하게 처벌합니다'' — (3) 법령 적용과 중복 시 **(4)에서 주장·판단, (3)에서 조문** 역할 분담'
    - (2) 증거의 요지와 중복 시 — (4)에 상세 기재하면 (2)는 **더 짧게**
    - '시각자료: 억울해요 / 경찰·검찰·법원 일관 진술 / 진술-사진·진단서 일치 / 증인 대화'
    phrase_rules:
    - match:
      - 부인
      - 주장
      - 무죄를 주장
      write: '4. {피고인}가 {행위}한 것이 맞습니다.

        1) {피고인}은 이렇게 말합니다.

        {피고인}의 주장을 쉬운 말로 요약 (예: 때리지 않았다, 억울하다).

        2) {피고인}가 {피해자}를 {행위}해 상처를 입혔습니다. 이유는 ①②③입니다.

        ① {피해자}는 맞았다고 똑같이 여러 번 말했습니다. 그 말을 믿을 수 있습니다.

        ② {피해자}가 말한 상처와 상해 사진·진단서 내용이 같습니다.

        ③ {증인들}이 {피고인}이 {범행 내용}이라고 말한 것을 들었습니다.

        '
      note: (4)(가) 부인 주장 — LEGAL_DB(무죄 주장 image_206, 일관 진술 image_077, 진술·증거 일치 image_083) 매칭 시 DB 우선
    - match:
      - 심신상실
      - 우울
      - 정신장애
      - 무죄
      write: '4. {질병·장애}이 있지만, {피고인}을 처벌합니다.

        1) {피고인}은 이렇게 말합니다.

        {질병} 때문에 범죄를 저질렀다. 그래서 무죄다.

        2) 그래도 {피고인}을 처벌합니다.

        {피고인}은 {질병}이 있습니다. 하지만 {질병} **때문에** 범죄를 저지른 것이 아닙니다.

        '
      note: (4)(나) 심신상실 주장 기각. LEGAL_DB(심신상실 image_020·021)는 면책용 — 기각 시 YAML 규칙 적용
    - match:
      - 지적장애
      - 심신미약
      - 사물변별능력
      - 의사결정능력
      write: '4. {장애}가 있으므로, {피고인}을 약하게 처벌합니다.

        1) {피고인}은 이렇게 말합니다.

        범죄를 하고 싶지 않았다. {장애}가 심해서 몰랐다. 무죄다.

        2) {장애}가 있으므로, 약하게 처벌합니다.

        {피고인}은 {장애}를 가지고 있습니다. 어떤 행동이 범죄인지를 잘 모릅니다.

        잘 몰라서 범죄를 저질렀으므로 약하게 처벌합니다.

        '
      note: (4)(나) 심신미약 인정 — (3) 형법 제10조와 역할 분담. LEGAL_DB(심신미약 image_203·204) 매칭 시 DB 우선
  sentencing_reasons:
    heading: <양형의 이유>
    avoid_terms:
    - 양형의 이유
    - 양형
    - 정상
    - 불리한 정상
    - 유리한 정상
    - 전과
    - 집행유예
    rules:
    - 피고인·변호인이 **가장 관심** 있는 부분 — 이지리드에 **반드시 포함** (설문에서 이해도 크게 상승)
    - '**소제목에 선고 결과(형량)를 직접** 넣기 — 주문(결론)과 맞춤 (예: ''5. 박수춘은 당장 감옥에 가지는 않습니다.'')'
    - '**2단 구조**: 1) ''{피고인}을 **나쁘게** 보는 이유'' → 2) ''{피고인}을 **좋게** 봐줄 만한 이유'''
    - 각 단계는 **① ② ③** 번호, 항목당 **한 문장** — 쉬운 말로
    - '불리한 요소 예: **전과**(다시 범죄할까 걱정), **피해자 불용서**, 누범, 피해 미회복'
    - '유리한 요소 예: **피해 회복**(물건·돈 돌려줌), **장애**(판단력 부족), **가족 보호 약속**, 합의·반성'
    - 주문의 집행유예·선고유예·벌금 등과 **표현 일치** — order.yaml 규칙과 연계
    - '시각자료: 전과(수상한 행동) / 불용서(감옥 바라봄) / 장애인 등록증 / 가족'
    phrase_rules:
    - match:
      - 집행을 유예
      - 집행유예
      - 당장 감옥
      write: 5. {피고인}은 당장 감옥에 가지는 않습니다.
      note: 징역형 집행유예 — order.yaml 집행유예와 소제목 일치
    - match:
      - 징역
      - 처한다
      write: 5. {피고인}은 감옥에 {기간} 있어야 합니다.
      note: 실형 선고 시
    - match:
      - 벌금
      - 처한다
      write: 5. {피고인}은 벌금 {금액}을 내야 합니다.
      note: 벌금형
    - match:
      - 전과
      - 처벌받은
      write: ① {피고인}은 예전에 {범죄}로 처벌받은 적이 있습니다. 다시 {범죄}할까 걱정됩니다.
      note: 불리한 — LEGAL_DB(동종 전과 image_979 등) 매칭 시 DB 우선
    - match:
      - 용서하지
      - 합의하지
      write: ② {피해자}는 {피고인}을 용서하지 않았습니다.
      note: 불리한 — LEGAL_DB('합의하지 못하였다', image_291) 매칭 시 DB 우선
    - match:
      - 반환
      - 돌려
      - 환부
      write: ① {피고인}은 {물건}을 {피해자}에게 돌려주었습니다.
      note: 유리한 — 피해 회복
    - match:
      - 지적장애
      - 장애인
      write: ② {피고인}은 {장애}인입니다. {장애} 때문에 판단을 잘못하여 {범죄}한 것 같습니다.
      note: 유리한 — LEGAL_DB('장애가 범행에 영향', image_278) 매칭 시 DB 우선
    - match:
      - 가족
      - 보호
      - 기회
      write: ③ {피고인}의 가족은 이렇게 말합니다. '다시 {범죄}하지 않게 잘 돌보겠습니다. 한 번 더 기회를 달라.'
      note: 유리한 — 가족 보호 약속
examples:
- id: single_punishment
  label: (1) 1개의 형을 선고하는 경우
  source: 피고인 갑을 징역 3년에 처한다.
  easy_read: '갑은 감옥에 3년 동안 있어야 합니다.

    '
- id: double_punishment
  label: (1) 2개의 형을 선고하는 경우
  source: '피고인 갑을 판시 제2의 가 죄(절도)에 대하여 징역 6개월에,

    판시 제2의 나 죄(사기)에 대하여 징역 6개월에 처한다.

    '
  easy_read: '갑은 절도죄를 지었으므로, 감옥에 6개월 동안 있어야 합니다.

    갑은 사기죄를 지었으므로, 감옥에 6개월 동안 있어야 합니다.

    전부 합하여 감옥에 1년 동안 있어야 합니다.

    '
- id: suspended_imprisonment
  label: 징역형의 집행유예
  source: '피고인 갑을 징역 10개월에 처한다.

    다만, 피고인 갑에 대하여 이 판결 확정일부터 2년간 위 형의 집행을 유예한다.

    '
  easy_read: '1. 갑은 죄가 있으므로 원래 10개월 동안 감옥에 있어야 하지만, 지금은 감옥에 가지 않습니다.

    2. 앞으로 2년 동안 갑이 어떻게 지내는지 살펴봅니다.

    3. 2년 안에 다른 죄를 지어 감옥에 가면, 여기서 정한 10개월도 더하여 감옥에 갇혀야 합니다.

    4. 2년 동안 다른 죄를 짓지 않으면, 이 사건 때문에 감옥에 가지 않습니다.

    '
  note: 'LEGAL_DB(징역 6월+집행유예 2년, image_007·008) 매칭 시 DB 우선. 형량·기간은 원문 숫자 유지.

    '
- id: suspended_fine
  label: (6) 벌금형의 집행유예
  source: '피고인 갑을 벌금 100만 원에 처한다.

    다만, 피고인 갑에 대하여 이 판결 확정일부터 2년간 위 형의 집행을 유예한다.

    '
  easy_read: '1. 갑은 죄를 지었으므로 원래 벌금 100만 원을 내야 하지만, 지금은 벌금을 내지 않습니다.

    2. 앞으로 2년 동안 갑이 어떻게 지내는지 살펴봅니다.

    3. 2년 안에 다른 죄를 지어 감옥에 가면, 여기서 정한 벌금 100만 원도 내야 합니다.

    4. 2년 동안 다른 죄를 짓지 않으면, 벌금을 내지 않습니다.

    '
  note: 'LEGAL_DB(벌금 100만+집행유예 2년, image_009·010) 매칭 시 DB 우선.

    발달장애인 등은 벌금형 집행유예 개념이 특히 어려움 — 4단계 필수.

    '
