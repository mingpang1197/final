- id: claim_denial_assault
  label: (4)(가) 부인 주장 — 폭행 부인·유죄
  source: "피고인의 주장에 대한 판단\n1. 피고인의 주장: 피고인 김을수는 피해자 권이사가 먼저 때리려 하여 밀었을 뿐\n   주먹으로 가격한 사실이 없다고 주장한다.\n2. 판단: 피고인의 주장은 받아들이지\
    \ 않는다. 피해자·증인 진술, 상해진단서,\n   현장사진 등에 의하여 피고인이 피해자를 폭행한 사실을 인정한다.\n"
  easy_read: '4. 김을수가 때려서 상처 입힌 것이 맞습니다.

    1) 김을수는 이렇게 말합니다.

    권이사가 먼저 때리려고 해서 밀었을 뿐, 주먹으로 친 적이 없다. 억울하다.

    2) 김을수가 권이사를 때려서 상처를 입혔습니다. 이유는 ①②③입니다.

    ① 권이사는 맞았다고 똑같이 여러 번 말했습니다. 그 말을 믿을 수 있습니다.

    ② 권이사가 말한 상처와 상해 사진, 진단서 내용이 같습니다.

    ③ 전○우, 박○우는 김을수가 "다리로 걸어 넘어뜨리고 얼굴을 계속 때렸다"고 말한 것을 들었습니다.

    '
  note: '소제목에 결론 포함. (2) 증거 요지보다 상세 — (4) 기재 시 (2)는 축약 가능.

    LEGAL_DB(무죄 주장 image_206, 일관 진술 image_077, 진술·증거 일치 image_083).

    '
- id: claim_insanity_rejected_depression
  label: (4)(나) 심신장애 — 우울증·심신상실 주장 기각
  source: "피고인의 주장에 대한 판단\n1. 피고인의 주장: 피고인은 우울증으로 인하여 범행 당시 심신상실 상태였다.\n2. 판단: 피고인에게 우울증 병력이 있으나, 범행 경위·수법·전후 행동·수사 중 진술 등에\n\
    \   비추어 사물변별·의사결정능력이 없었다고 보기 어렵다. 심신상실 주장은 받아들이지 않는다.\n"
  easy_read: '4. 우울증이 있지만, 김복동을 처벌합니다.

    1) 김복동은 이렇게 말합니다.

    우울증 때문에 범죄를 저질렀다. 그래서 무죄다.

    2) 그래도 김복동을 처벌합니다.

    김복동은 우울증이 있습니다. 하지만 우울증 때문에 범죄를 저지른 것이 아닙니다.

    '
  note: 심신상실(무죄) 기각 — '질병 때문이 아님' 강조. LEGAL_DB(정신질환 image_216)는 참고용
- id: claim_diminished_intellectual_disability
  label: (4)(나) 심신장애 — 지적장애·심신미약 인정
  source: "피고인 및 변호인의 주장에 대한 판단\n1. 주장: 피고인은 심한 지적장애로 범행 당시 심신상실 상태였다.\n2. 판단: 심한 지적장애로 사물변별·의사결정능력이 미약하였으나, 증거에 비추어\n   완전히\
    \ 없었다고 보기 어렵다. 심신상실 주장은 기각하되, 감경한다.\n"
  easy_read: '4. 지적장애가 있으므로, 김복동을 약하게 처벌합니다.

    1) 김복동은 이렇게 말합니다.

    범죄를 하고 싶지 않았다. 지적장애가 심해서 몰랐다. 무죄다.

    2) 지적장애가 있으므로, 약하게 처벌합니다.

    김복동은 심한 지적장애를 가지고 있습니다. 어떤 행동이 범죄인지를 잘 모릅니다.

    잘 몰라서 범죄를 저질렀으므로 약하게 처벌합니다.

    '
  note: '심신상실 기각 + 심신미약 감경. (3) 형법 제10조 조문은 (3)에서, 주장·판단은 (4)에서 기재.

    LEGAL_DB(''사물변별능력이 미약'', image_203) 매칭 시 DB 우선.

