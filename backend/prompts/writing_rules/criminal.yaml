- id: sentencing_probation_theft_disability
  label: (5) 양형의 이유 — 집행유예·절도·지적장애
  source: '양형의 이유

    피고인 박수춘에게 징역 8월, 집행유예 2년을 선고한다.

    피고인은 동종 절도 전과가 있고 피해자가 용서하지 않았으나,

    훔친 전동킥보드를 피해자에게 반환하였고, 지적장애인으로 판단력이 부족하며,

    가족이 재범 방지를 약속하였다.

    '
  easy_read: '5. 박수춘은 당장 감옥에 가지는 않습니다.

    1) 박수춘을 나쁘게 보는 이유는 이렇습니다.

    ① 박수춘은 예전에 물건을 훔쳐 처벌받은 적이 있습니다. 다시 훔칠까 걱정됩니다.

    ② 전동킥보드 주인은 박수춘을 용서하지 않았습니다.

