  - id: reasons_loan_partial_repayment
    label: "나.(1)(가) 이유 — 대여금 일부 인용·변제 항변"
    source: |
      이유
      1. 기초사실: 원고는 피고에게 2억 원을 대여하였고, 피고는 5천만 원을 변제하였다.
      2. 당사자의 주장: (생략)
      3. 판단: 피고는 잔액 1억 5천만 원 및 지연손해금을 지급할 의무가 있다.
    easy_read: |
      <이런 결론을 내린 이유>
      1) 김OO는 이ㅁㅁ한테 2억 원을 빌려주었습니다.
      2) 이ㅁㅁ은 김OO한테 5천만 원을 갚았습니다.
      3) 김OO이 빌려준 2억 원에서 이미 갚은 5천만 원을 빼고 나면, 1억 5천만 원이 남습니다.
      2. 이ㅁㅁ은 김OO에게 빌린 돈을 갚아야 합니다.
      4) 따라서 이ㅁㅁ은 김OO에게 남은 돈 1억 5천만 원을 갚아야 합니다.
         돈을 늦게 주면, 늦은 만큼 이자를 붙여서 같이 줘야 합니다.
    note: |
      4단 구조 — ①②③ 기초사실(계산) + ③④ 판단·결론 상세.
      LEGAL_DB(대여 image_402, 변제 image_401, 지연손해 image_336) 매칭 시 DB 우선.

  - id: reasons_breach_contract_damages
    label: "나.(1)(나) 이유 — 채무불이행 손해배상 (중고차 매매)"
    source: |
      이유
      피고는 원고와 중고자동차 매매계약을 체결하였으나 이행하지 아니하여,
      원고는 1억 원 상당의 손해를 입었다. 피고는 이를 배상할 책임이 있다.
    easy_read: |
      <이런 결론을 내린 이유>
      1) 이ㅁㅁ은 김OO에게 중고차를 **팔기로 약속**했습니다.
      2) 그러나 이ㅁㅁ은 **약속을 지키지 않았습니다**.
      3) 그래서 김OO는 **손해**를 입었습니다. 돈으로 계산하면 1억 원입니다.
      4) 따라서 이ㅁㅁ은 김OO에게 1억 원을 줍니다.
         돈을 늦게 주면, 늦은 만큼 이자를 붙여서 같이 줘야 합니다.
    note: |
      '계약' 대신 '약속' (장애인 설문). LEGAL_DB('채무불이행', image_388) 매칭 시 DB 우선.

  - id: reasons_unjust_enrichment_salt_farm
    label: "나.(1)(다) 이유 — 부당이득반환 (염전 무임금)"
    source: |
      이유
      원고는 피고의 염전에서 6년 이상 근로하였으나 임금을 지급받지 못하였다.
      피고는 근로계약을 체결하지 않았으나, 월 150만 원 상당의 부당이득을 반환할 의무가 있다.
    easy_read: |
      <이런 결론을 내린 이유>
      1) 김OO는 이ㅁㅁ 시키대로 **염전**(소금 만드는 곳)에서 일했습니다.
         염전 옆에서 6년 넘게 살면서 계속 일했습니다.
      2) 김OO는 이ㅁㅁ에게 **임금을 받지 못했습니다**.
      3) 이ㅁㅁ은 임금을 주겠다고 **약속한 적 없습니다**.
      4) 그러나 김OO는 일한 기간 동안 **한 달에 150만 원**씩 받을 수 있습니다. 이유는 ①②③입니다.
         ① 김OO는 지적장애가 있지만 다른 사람만큼 잘 일했습니다.
         ② 염전에서 같이 일한 다른 사람들은 한 달에 150만 원을 받기로 되어 있었습니다.
         ③ 김OO가 다른 곳에서 일해도 한 달에 150만 원은 받을 수 있었습니다.
      5) 일한 대가로 받을 돈은 이자를 포함해 **약 1억 3,700만 원**입니다.
    note: |
      LEGAL_DB(염전 image_370·371, 무임금 image_374, 지적장애 image_461) 매칭 시 DB 우선.

  - id: reasons_tort_abuse_compensation
    label: "나.(1)(라) 이유 — 불법행위 손해배상 (지속적 학대·위자료)"
    source: |
      이유
      피고는 6년 이상 원고의 엉덩이 등을 막대기로 수차례 폭행·학대하여
      원고에게 정신적 고통을 가하였다. 피고는 위자료 1,500만 원을 지급할 책임이 있다.
    easy_read: |
      <이런 결론을 내린 이유>
      3. 김OO는 위자료* 1,500만 원을 받을 수 있습니다.
      (*위자료: 마음을 힘들고 괴롭게 한 것 때문에 주는 돈)
      1) 김OO는 지적장애가 있습니다.
      2) 이ㅁㅁ은 6년 넘게 김OO를 때리고 괴롭혔습니다. 막대기로 엉덩이를 여러 번 때렸습니다.
      3) 그래서 김OO는 마음이 힘들고 괴로웠습니다.
      4) 김OO의 위자료는 1,500만 원입니다.
    note: |
      LEGAL_DB(학대·엉덩이 image_376, 위자료 image_468, 정신적 피해 image_362) 매칭 시 DB 우선.

  - id: reasons_lease_expiration_eviction
    label: "나.(1)(마) 이유 — 부동산 인도 (임대기간 만료)"
    source: |
      이유
      원고와 피고는 2009. 6. 16.부터 2011. 6. 16.까지 초고아파트 12동 304호
      임대차계약(보증금 9,000만 원)을 체결하였다. 임대기간이 만료하였으므로
      피고는 퇴거하여 원고에게 인도할 의무가 있다.
    easy_read: |
      <이런 결론을 내린 이유>
      1) 김OO(집주인)은 이ㅁㅁ(세입자)에게 초고아파트 12동 304호를 빌려주었습니다.
      2) 약속은 두 가지입니다.
         ① **빌린 기간**: 2009년 6월 16일부터 2011년 6월 16일까지 (2년)
         ② **임대보증금***: 9,000만 원
         (*임대보증금: 집 빌려 사는 동안 맡겨 두었다가 이사 나갈 때 돌려받는 돈)
      2. 지금은 2011년 6월 16일이 **지났습니다**.
         이ㅁㅁ은 **당장** 이사 나가고, 김OO에게 304호를 돌려줘야 합니다.
    note: |
      LEGAL_DB(임대계약 image_365, 임대기간 image_366, 퇴거 image_364) 매칭 시 DB 우선.

  - id: defense_repayment_full
    label: "나.(2)(가) 변제 항변 — 전액 변제 인용"
    source: |
      피고의 변제 항변에 대한 판단
      증거에 의하면 피고는 2019. 9. 12. 원고에게 100만 원을 지급하여
      대여금 채무를 변제·소멸시켰다. 피고의 변제 항변은 이유 있다.
    easy_read: |
      <이런 결론을 내린 이유>
      이ㅁㅁ은 김OO에게 빌린 돈을 **모두 갚았습니다**.
      이제 이ㅁㅁ은 김OO에게 **갚을 빚이 없습니다**.
    note: |
      변제 사실 쟁점 없으면 날짜·방법 생략. LEGAL_DB('채무를 변제', image_401) 매칭 시 DB 우선.

  - id: defense_setoff_goods
    label: "나.(2)(나) 상계 항변 — 물품대금 상계"
    source: |
      피고의 상계 항변에 대한 판단
      피고는 원고에 대한 6,000만 원 대여금 채무와 상계하기 위하여
      원고에 대한 4,000만 원 물품대금 채권을 상계한다. 상계 항변은 이유 있다.
    easy_read: |
      <이런 결론을 내린 이유>
      1) 이ㅁㅁ은 김OO에게 빌린 **6,000만 원**을 갚아야 합니다.
      2) 그러나 이ㅁㅁ이 김OO에게 **받을 돈** 4,000만 원이 있습니다. (물건을 팔아준 값)
      3) 6,000만 원에서 4,000만 원을 **빼면**, **2,000만 원**만 갚으면 됩니다.
    note: |
      '상계' → 빼기. LEGAL_DB('상계(피고)', image_392) 매칭 시 DB 우선.

  - id: defense_prescription_rejected_continuous_tort
    label: "나.(2)(다) 소멸시효 — 배척 (지속적 괴롭힘·3년)"
    source: |
      피고의 소멸시효 항변에 대한 판단
      피고는 불법행위가 3년 이전에 대부분 종료되었으므로 위자료청구권이
      소멸시효로 소멸하였다고 주장한다. 그러나 지속적 불법행위로
      2014. 1. 30. 이후에도 행위가 있었으므로 3년 단기소멸시효가 완성되지 않았다.
    easy_read: |
      <이런 결론을 내린 이유>
      4. 이ㅁㅁ은 위자료를 줄 수 없다고 합니다.
      1) 이ㅁㅁ 주장: 김OO를 괴롭힌 것이 3년 전 일이라 돈을 안 줘도 된다.
      2) 누가 괴롭혔는지 알고 **3년**이 지나면, 돈을 달라고 할 수 없습니다.
      3) 그러나 이ㅁㅁ이 김OO를 **마지막으로** 괴롭힌 지 **3년이 안 지났습니다**.
      4) 따라서 김OO는 **이ㅁㅁ에게서 위자료를 받을 수 있습니다**.
    note: "지속적 불법행위 — 마지막 행위 기준. LEGAL_DB('소멸시효 미완성', image_355)"

  - id: defense_prescription_accepted_commercial_loan
    label: "나.(2)(다) 소멸시효 — 인용 (상사 5년·대여금)"
    source: |
      피고의 소멸시효 항변에 대한 판단
      이 사건 대여금은 상행위로 인한 채권으로 5년의 상사소멸시효가 적용된다.
      변제기 2012. 10. 말부터 5년이 경과한 후 2022. 10. 24. 소가 제기되었으므로
      소멸시효가 완성하였다. 피고의 항변은 이유 있다.
    easy_read: |
      <이런 결론을 내린 이유>
      4. 이ㅁㅁ가 돈을 빌린 것은 **너무 오래**되었습니다. 이ㅁㅁ는 **돈을 갚지 않아도 됩니다**.
      1) 이ㅁㅁ가 김OO한테서 돈을 빌린 것은 **맞습니다**.
      2) 그런데 **돈을 갚기로 한 날**로부터 **5년**이 지났습니다.
      3) **너무 오래된 일**이라 이제 이ㅁㅁ는 **돈을 갚지 않아도 됩니다**.
    note: |
      인용 시 법리·판례 생략, 기간+효과만. LEGAL_DB('소멸시효 완성', image_354) 매칭 시 DB 우선.

  - id: defense_capacity_contract_valid
    label: "나.(2)(라) 의사무능력 — 계약 무효 주장 배척 (아파트 매매)"
    source: |
      피고의 의사무능력 주장에 대한 판단
      피고는 경미한 지적장애로 계약 당시 의사무능력자였으므로 매매계약이 무효라고 주장한다.
      그러나 피고는 동일 아파트 매수계약 경험이 있고, 수개월간 매도 의사 표시·
      계약 당일 30분 설명 청취 후 직접 날인하였으므로 당시 의사능력이 충분하였다.
      피고의 주장은 이유 없다.
    easy_read: |
      <이런 결론을 내린 이유>
      1) 이ㅁㅁ은 이렇게 말합니다.
         지적장애 때문에 아파트를 **팔 때** 무엇을 하는지 몰랐다.
         **계약은 없는 것**이고, 김OO에게 아파트를 **넘기지 않아도** 된다.
      2) **계약은 유효**합니다.
         이ㅁㅁ은 직접 아파트를 **팔러** 갔습니다.
         지적장애가 있지만, 설명을 **30분** 듣고 **도장**을 직접 찍었습니다.
         예전에도 같은 아파트 **계약** 경험이 있습니다.
         따라서 이ㅁㅁ은 김OO에게 **아파트를 넘겨줘야** 합니다.
    note: |
      계약 경험 있으면 '계약' 유지(약속 X). 이중부정 금지.
      LEGAL_DB('의사능력 인정', image_462, '계약 유효', image_463) 매칭 시 DB 우선.

  - id: misc_gongyu_habyu_chongyu
    label: "(3)(가) 기타 — 공유·합유·총유"
    source: |
      이 건물은 김OO, 이□□, 박◇◇의 공유물이다. 김OO 지분 1/4, 이□□ 1/4, 박◇◇ 2/4.
      (별도) ○○부동산은 ○○조합의 총유물이다.
    easy_read: |
      **공유**
      김OO, 이□□, 박◇◇ 3명이 건물·땅·자동차를 **함께** 가지고 있습니다.
      김OO가 가진 것은 **1/4**입니다. 이□□는 **1/4**. 박◇◇는 **2/4**입니다.
      **각자 자기 몫만** 마음대로 팔 수 있습니다.

      **합유**
      김OO, 이□□, 박◇◇ 3명이 건물·땅·자동차를 **함께** 가지고 있습니다.
      이 건물·땅·자동차를 **팔려면** 3명 **모두 허락**해야 합니다.

      **총유**
      △△단체가 이 건물·땅·자동차를 가지고 있습니다.
      △△단체 사람들이 **모여 정식으로 회의**해야만 팔 수 있습니다.
    note: "LEGAL_DB(공유 image_349, 합유 image_350, 총유 image_351) 매칭 시 DB 우선"

  - id: misc_sham_contract
    label: "(3)(나) 기타 — 가장행위(통정허위표시)"
    source: |
      이 사건 매매계약은 채권자를 속이기 위한 통정허위표시에 해당하여 무효로 한다.
    easy_read: |
      상대방과 **가짜로** 한 **계약**은 **무효**입니다.
    note: "LEGAL_DB('통정허위', image_353) 매칭 시 DB 우선"

  - id: misc_comparative_negligence
    label: "(3)(다) 기타 — 과실상계"
    source: |
      이 사건에 관하여 원고에게도 과실이 있으므로 과실상계를 하여
      피고의 손해배상책임을 제한한다.
