# 민사판결 — 이지리드 작성 규칙
# 가이드북 III. 민사판결서
#   1. 기재사항 및 작성 요점
#   3. 가~마, 나. 이유·(2) 항변·(3) 기타 표현(공유·합유·총유·통정허위·과실상계)
# 주문·청구취지는 이유 안에 포함

doc_type: civil
section_label: "민사판결"

section_order:
  - overview
  - claim_and_conclusion
  - acceptance_judgment
  - litigation_costs
  - provisional_execution
  - defenses
  - reasons
  - misc_expressions

sections:
  overview:
    heading: "<민사판결 이지리드 — 작성 요점>"
    rules:
      - "민사소송법 제205·206·208조 — 판결 정본 7가지: ① 당사자·대리인 ② **주문** ③ **청구취지** ④ **이유** ⑤ 변론종결일 ⑥ 법원명 ⑦ 판사 서명·날인"
      - "이지리드에서 **쉽게 바꿔 쓸 부분**: ② 주문, ③ 청구취지, ④ 이유 (핵심 3가지)"
      - "**배치**: 청구·결론 이지리드 박스를 **판결 '이유' 부분 맨 앞**에 삽입 (별첨 ❌)"
      - "주문·청구취지는 형식이 **표준화**되어 있어 통일 템플릿 작성이 용이"
      - "이유는 민사가 형사보다 **덜 표준화·더 복잡** — 자주 쓰이는 유형 위주 템플릿"
      - "판결문은 간결·격식 → 이지리드는 **이해** 우선, 설명이 길어져도 됨"
      - "당사자가 알고 싶은 **핵심**: ① 최종 주문에 이른 **주요 이유** ② **쟁점**에 대한 **법원 판단**"
    phrase_rules: []

  claim_and_conclusion:
    heading: "<청구취지와 주문(결론)>"
    avoid_terms:
      - "청구취지"
      - "청구의 취지"
      - "주문"
      - "주문의 내용"
      - "소각"
      - "각하"
      - "기각"
      - "원고가 졌습니다"
      - "원고가 이겼습니다"
      - "소장"
      - "인도청구"
      - "명도"
    placement: "이유 부분 **맨 앞** — 이지리드 박스"
    rules:
      - "'청구취지'·'주문'은 이해하기 어려움 → **쉬운 제목**으로 교체"
      - "**섹션 순서 (필수)**: `<이 판결의 결론>`을 **항상 청구보다 먼저** 작성. 청구·결론을 **별도 소제목**으로 쓸 때는 ① 결론 ② 청구 순."
      - "**제목 선택** (상황별):"
      - "  · 청구만: **'<이 소송에서 {원고}가 요구하는 것>'** 또는 **'<{원고}가 원하는 것>'**"
      - "  · 결론만: **'<이 판결의 결론>'** (청구와 다를 때)"
      - "  · **전부 인용**(원고 승): **'<{원고}가 원하는 것과 이 판결의 결론>'** — 청구·결론 **합침**"
      - "원고·피고 이름은 **실명** (예: 김OO, 이ㅁㅁ)"
      - "청구: '{원고}는 {피고}에게 이렇게 요구합니다.' + **따옴표**로 구체 요청"
      - "결론: '{원고}가 원하는 대로, {피고}는 …' 또는 '피고는 원고에게 …'"
      - "**(2) 주문(결론) — 유형 구분**:"
      - "  · **(가) 소각하·각하**(절차상): '**이 소송은 받아주지 않습니다.**' + **왜** (1~2문장)"
      - "  · **(나) 청구기각**(실체): '**{원고}가 요구하는 것을 받아주지 않습니다.**' / '**원하는 대로 해줄 수 없습니다.**'"
      - "**'원고가 졌습니다' ❌** — 게임·승부처럼 들려 비추 (설문)"
      - "상황에 맞게 바꿀 수 있음 (예: '{원고}는 {피고}한테서 돈을 받을 수 없습니다')"
      - "**일부 기각**은 이지리드에서 혼란 우려 → 가이드북 예시 제외 (필요 시 쉬운 말로만)"
      - "시각자료: X 표시(각하/기각) / 판사·서류 / 짐·돈 등"
    phrase_rules:
      - match: ["인도", "명도", "퇴거", "나가"]
        write: |
          <이 소송에서 {원고}가 요구하는 것>
          {원고}는 {피고}에게 이렇게 요구합니다.
          "{장소}에서 나가고, {장소}를 돌려주세요!"
        note: "(1) 건물 인도·퇴거 청구. LEGAL_DB(부동산 명도 image_325, 퇴거 image_364) 매칭 시 DB 우선"
      - match: ["위자료", "손해배상", "정신적"]
        write: |
          <{원고}가 원하는 것>
          {피고}는 {원고}를 {폭행·괴롭힘 등}했습니다.
          {원고}는 힘들고 괴로웠으니 돈을 받고 싶습니다. 약 {금액}을 원합니다.
        note: "(1) 위자료 청구. LEGAL_DB(위자료 image_468) 매칭 시 DB 우선"
      - match: ["인용", "승소", "원고의 청구"]
        write: |
          <{원고}가 원하는 것과 이 판결의 결론>
          {원고}가 원하는 대로, {피고}는 {장소}에서 나가야 합니다.
        note: "(1) 청구 전부 인용 — 청구·결론 합침"
      - match: ["소를 각하", "소각", "각하"]
        write: |
          <이 판결의 결론>
          이 소송은 받아주지 않습니다.
          {이유 — 예: 예전에 똑같은 소송에서 이겼음 / 소송 상대를 잘못 골랐음}
        note: "(2)(가) 소각하·각하. LEGAL_DB('소를 각하', image_001) 매칭 시 DB 우선"
      - match: ["보호의 이익", "확정", "기판력"]
        write: |
          이 소송은 받아주지 않습니다.
          {원고}은 예전에 똑같은 소송을 하여 이겼습니다. 다시 받아줄 필요가 없습니다.
        note: "(2)(가) 보호의 이익 없음 — 확정판결 후 재소"
      - match: ["당사자적격", "소송 상대", "피고"]
        write: |
          이 소송은 받아주지 않습니다.
          {원고}은 소송할 상대방을 잘못 골랐습니다. {피고}한테 이 소송을 이겨도 아무 소용이 없습니다.
        note: "(2)(가) wrong defendant / 당사자적격"
      - match: ["기각", "패소"]
        write: |
          <이 판결의 결론>
          {원고}가 요구하는 것을 받아주지 않습니다.
        note: "(2)(나) 청구기각 — LEGAL_DB('청구를 기각', image_002) 매칭 시 DB 우선"
      - match: ["기각", "원하는 대로"]
        write: "{원고}가 원하는 대로 해줄 수 없습니다."
        note: "(2)(나) 청구기각 — 대안 표현 (설문 선호)"
      - match: ["기각", "돈", "지급"]
        write: "{원고}는 {피고}한테서 돈을 받을 수 없습니다."
        note: "(2)(나) 금전 청구 기각 — 상황별 표현"

  acceptance_judgment:
    heading: "<인용판결 — 원고가 이긴 경우>"
    avoid_terms:
      - "인용"
      - "연대하여"
      - "합동하여"
      - "공동하여"
      - "지연손해금"
      - "별지 목록"
      - "소유권이전등기"
      - "근저당권설정등기"
      - "말소등기"
      - "채무부존재"
    placement: "청구·결론 박스 또는 `<{원고}가 원하는 것과 이 판결의 결론>`"
    rules:
      - "**(다) 인용판결** — 당사자가 가장 알고 싶은 것: **누가·누구에게·얼마/무엇**"
      - "**① 금전지급**: '{피고}는 {원고}에게 {금액}을 줍니다.' + '늦게 갚으면 **이자를 더** 내야 합니다.'"
      - "  · **연대채무**: '연대하여/합동하여/공동하여' ❌ → **'함께'** (예: 이ㅁㅁ, 박☆☆, 최◇◇ **세 사람이 함께** …)"
      - "  · 금액: 147,775,000원 → **'약 1억 5천만 원'** 등 큰 단위로 반올림"
      - "  · 지연손해: 날짜·% 계산 ❌ → '**늦게 갚은 만큼 이자를 더** 내야 합니다' (필요 시 '1년 늦으면 300만 원 더' 등 **구체 예**)"
      - "**② 건물 철거·인도**: 철거 → '건물을 **부숴야**' / 인도 → '**나가고 돌려줘야**'"
      - "  · 당사자가 아는 부동산이면 **상세 주소 생략** 가능 (식별만 되면 됨)"
      - "  · **동시이행**(일부 인용): '{피고}는 {원고}가 {금액}을 돌려줄 때까지 {장소}에만 살 수 있음 → 돈 받으면 **바로** 나가야'"
      - "**③ 소유권이전등기**: '매매계약' ❌ → '**팔았습니다**' / '등기 절차 이행' → '**등기**해서 집 주인을 바꿔줘야'"
      - "  · '별지 목록' ❌ → '**삼성동 집**' 등 **설명적 위치**"
      - "  · *등기: 나라 기록에 집 주인을 적는 것. 해야 진짜 주인*"
      - "**④ 근저당 말소**: ① 돈 빌림 → ② 집 담보 **등기** → ③ 다 갚았으니 **등기 없애야**"
      - "**⑤ 채무부존재**: '{사건} 때문에 {원고}가 {피고}에게 **줄 돈은 없습니다**'"
      - "시각자료: 돈·함께(연대) / 굴착기(철거) / 열쇠(인도) / 등기부 / X(채무 없음)"
    phrase_rules:
      - match: ["지급", "금", "원"]
        write: "{피고}는 {원고}에게 {금액}을 줍니다. 늦게 갚으면 이자를 더 내야 합니다."
        note: "① 단독 금전지급"
      - match: ["연대", "공동", "피고들"]
        write: "{피고1}, {피고2}, {피고3} **세 사람이 함께** {원고}에게 {금액}을 줍니다. 늦게 갚으면 이자를 더 내야 합니다."
        note: "① 연대채무 — LEGAL_DB('연대하여', image_347) 매칭 시 DB 우선"
      - match: ["지연손해", "이자"]
        write: "늦게 갚은 만큼 이자를 더 내야 합니다."
        note: "LEGAL_DB('지연손해금', image_336) 매칭 시 DB 우선"
      - match: ["철거"]
        write: |
          {장소} 건물은 {원고} 땅 위에 있습니다.
          {피고}는 건물을 부숴야 합니다. 땅도 {원고}에게 돌려줘야 합니다.
        note: "② 철거+토지 반환. LEGAL_DB(건물 철거 image_409)"
      - match: ["인도", "명도", "퇴거"]
        write: "{피고}는 {호수}에서 나가야 합니다. {호수}를 {원고}에게 돌려줘야 합니다."
        note: "② 부동산 인도. LEGAL_DB(부동산 명도 image_325, 퇴거 image_364)"
      - match: ["동시이행", "상계"]
        write: |
          1) {피고}는 {원고}가 {금액}을 돌려줄 때까지 {장소}에만 살 수 있습니다.
          2) 돈을 받으면 {피고}는 **바로** 나가서 {장소}를 돌려줘야 합니다.
        note: "② 동시이행 — 일부 인용"
      - match: ["소유권", "이전등기", "매매"]
        write: |
          {날짜}에 {피고}는 {장소} 집을 {원고}에게 **팔았습니다**.
          {피고}는 **등기**해서 집 주인을 {원고}로 바꿔줘야 합니다.
          *등기: 나라 기록에 집 주인을 적는 것. 해야 진짜 주인이 됩니다.
        note: "③ 소유권이전등기. LEGAL_DB(소유권이전등기 image_381)"
      - match: ["근저당", "말소"]
        write: |
          1) {차주}는 {채권자}에게 돈을 빌렸습니다.
          2) 빌릴 때 {차주} 집을 담보로 **등기**했습니다. (*담보 등기: 그 집으로 먼저 돈 받을 수 있다고 적어 둔 것*)
          3) {차주}는 돈을 **다 갚았습니다**. {채권자}는 이제 담보 **등기를 없애**줘야 합니다.
        note: "④ 근저당 말소. LEGAL_DB(근저당권 image_337)"
      - match: ["채무부존재", "존재하지"]
        write: "{사건} 때문에 {원고}가 {피고}에게 **줄 돈은 없습니다**."
        note: "⑤ 채무부존재. LEGAL_DB(채무부존재 image_435)"

  litigation_costs:
    heading: "<소송비용>"
    avoid_terms:
      - "소송비용"
      - "비용부담"
      - "각 부담"
    placement: "주문(결론) **끝** 또는 별도 짧은 문단"
    rules:
      - "장애인 설문 — **'소송비용' 용어 이해 어려움** → 반드시 **쉬운 말 + 정의**"
      - "**정의**: *소송비용: 소송할 때 드는 돈. **주로 변호사에게 주는 돈*** (비중이 가장 큼)"
      - "**원고 전부**: '소송비용은 **전부 {원고}**이 냅니다.'"
      - "**쌍방 50%**: '{원고}와 {피고}가 **1/2씩** 냅니다.'"
      - "**각자 부담**: '{원고} 때문에 생긴 비용은 {원고} / {피고} 때문에 생긴 비용은 {피고}'"
      - "비율 분담(10:90 등): LEGAL_DB(image_451~460) 매칭 시 **DB 우선**"
      - "시각자료: 계산기·돈 더미 / 파이차트 50:50 / 각자 부담"
    phrase_rules:
      - match: ["소송비용", "원고", "부담"]
        write: |
          소송비용*은 전부 {원고}이 냅니다.
          *소송비용: 소송할 때 드는 돈. 주로 변호사에게 주는 돈입니다.
        note: "(라) 원고 100%. LEGAL_DB('소송비용은 원고', image_460)"
      - match: ["50%", "1/2", "반"]
        write: |
          소송비용*은 {원고}와 {피고}가 1/2씩 냅니다.
          (*소송비용: 소송할 때 드는 돈. 주로 변호사에게 준다.)
        note: "(라) 50:50. LEGAL_DB('50%', image_455)"
      - match: ["각자", "각 부담", "원인"]
        write: |
          소송비용이란, 이 소송에 들어간 돈이고, 주로 변호사에게 주는 돈입니다.
          {원고} 때문에 생긴 소송비용은 {원고}이 냅니다.
          {피고} 때문에 생긴 소송비용은 {피고}이 냅니다.
        note: "(라) 각자 부담"

  provisional_execution:
    heading: "<가집행>"
    avoid_terms:
      - "가집행"
      - "민사집행"
    placement: "주문 **마지막** (해당할 때만)"
    rules:
      - "재물청구 등에서 당사자 관심 **낮으면** 생략 가능"
      - "기재할 때: '**{원고}**은 이 판결을 가지고 법원에 가서, **당장** {피고}의 재산을 팔아 돈으로 달라고 요청할 수 있습니다.'"
      - "형사 **배상명령** 가집행은 order.yaml 에서 생략 — 민사 가집행과 **구분**"
      - "시각자료: 판결문 + 돈 / 법원"
    phrase_rules:
      - match: ["가집행"]
        write: |
          {원고}은 이 판결을 가지고 법원에 가서,
          당장 {피고}의 재산을 팔아서 돈으로 달라고 요구할 수 있습니다.
        note: "(마) 가집행. LEGAL_DB('가집행', image_450) 매칭 시 DB 우선"

  defenses:
    heading: "<주요 항변 및 주장>"
    avoid_terms:
      - "변제 항변"
      - "상계 항변"
      - "항변"
      - "소멸"
      - "상계"
      - "소멸시효"
      - "시효"
      - "의사무능력"
      - "의사능력"
    placement: "이유 부분 — **당사자 주장·판단** (②③)"
    rules:
      - "**(2) 주요 항변** — 피고(또는 원고) **주장**과 법원 **인용·기각**을 쉬운 말로"
      - "**(가) 변제 항변**: '**모두 갚았습니다**. 이제 **갚을 빚이 없습니다**'"
      - "  · 변제 **쟁점 없음** → 날짜·방법 **생략** 가능"
      - "  · **쟁점 있음** → 통장 이체·증인 진술 등 **증거** 한 줄 기재"
      - "**(나) 상계 항변**: '갚아야 할 돈' − '받아야 할 돈' = **남은 돈만** 갚음 (**빼기**)"
      - "  · 1) {A}는 {B}에게 {총액}을 갚아야 함 2) 그러나 {A}가 {B}에게 **받을 돈** {상계액} 3) **{잔액}만** 갚으면 됨"
      - "'상계' ❌ → **서로 받을 돈을 빼기** / **없는 것으로 하기**"
      - "**(다) 소멸시효 항변**: '**너무 오래되어** 돈을 **안 줘도 됨**' / '**아직** {기간}이 **안 지남** → **줘야 함**'"
      - "  · **인용(기각 청구)**: '{피고} 주장 → 그러나 {기간} 지남 → **갚지 않아도 됨**' (법리·판례 **생략**, 기간+효과만)"
      - "  · **배척(청구 인용)**: '{피고} 주장 → 그러나 **아직 {기간} 안 지남** → **받을 수 있음**'"
      - "  · **지속적 불법행위**: 마지막 행위 기준 **기간 새로 시작** — '마지막 괴롭힘이 {기간} 안'"
      - "  · **상사 5년**: '갚기로 한 날부터 **5년** 지남 → 갚지 않아도 됨'"
      - "**(라) 의사무능력·계약 무효**: 1) '{당사자} 주장' → 2) '**계약은 유효**' + 이유"
      - "  · 지적장애 있어도: **직접 방문·설명 듣고·도장 찍음** → **계약 이해·유효**"
      - "  · **계약 경험** 있으면 **'계약'** 유지 ('약속' 대신) — 기본 문해력 가정"
      - "  · **이중부정 ❌** ('의사능력 없음이 **증명되지 않으면** 받아들일 수 없다' → '**계약은 유효**')"
      - "시각자료: 모두 갚음(체크) / 돈 더미 빼기 / 달력+X / 계약서+도장"
    phrase_rules:
      - match: ["변제 항변", "변제하였", "전부 변제"]
        write: |
          {피고}는 {원고}에게 빌린 돈을 **모두 갚았습니다**.
          이제 {피고}는 {원고}에게 **갚을 빚이 없습니다**.
        note: "(2)(가) 변제 항변 인용. LEGAL_DB('채무를 변제', image_401)"
      - match: ["변제", "쟁점", "이체"]
        write: |
          {피고}는 {날짜}에 {금액}을 {방법}으로 갚았습니다. ({증거 — 통장·증인})
        note: "(2)(가) 변제 — 쟁점 있을 때 증거 추가"
      - match: ["상계", "상계항변", "대등"]
        write: |
          1) {피고}는 {원고}에게 빌린 {총액}을 갚아야 합니다.
          2) 그러나 {피고}가 {원고}에게 **받을 돈** {상계액}이 있습니다. ({이유 — 물건값 등})
          3) {총액}에서 {상계액}을 **빼면**, {잔액}만 갚으면 됩니다.
        note: "(2)(나) 상계 항변. LEGAL_DB('상계(피고)', image_392)"
      - match: ["소멸시효", "시효", "기간이 지나"]
        write: |
          {피고}는 {기간}이 지나서 돈을 안 줘도 된다고 합니다.
          1) {피고}가 {원고}에게 {행위}한 것은 맞습니다.
          2) 그러나 {기준일}부터 **{기간}**이 지났습니다.
          3) **너무 오래된 일**이라 {피고}는 **{돈}을 갚지 않아도 됩니다**.
        note: "(2)(다) 소멸시효 **인용**. LEGAL_DB('소멸시효 완성', image_354)"
      - match: ["소멸시효", "완성되지", "지속"]
        write: |
          {피고} 주장: {기간} 전 일이라 돈을 안 줘도 된다.
          2) {기간}이 지나면 돈을 달라고 할 수 없습니다.
          3) 그러나 {피고}가 {원고}를 **마지막으로** {행위}한 지 **{기간}이 안 지났습니다**.
          4) 따라서 {원고}는 **{돈}을 받을 수 있습니다**.
        note: "(2)(다) 소멸시효 **배척**·지속적 불법행위. LEGAL_DB('소멸시효 미완성', image_355)"
      - match: ["의사무능력", "의사능력", "계약 무효", "지적장애"]
        write: |
          1) {당사자} 주장: {장애} 때문에 {계약} 내용을 몰랐다. **계약은 없는 것**이고 {의무}하지 않아도 된다.
          2) **{계약}은 유효**합니다. {당사자}는 직접 {행위}했습니다.
             {장애}가 있지만, {설명 듣고·도장·이전 경험} → **이해하고 {계약}한 것**입니다.
             따라서 {당사자}는 {의무 — 아파트 넘기기 등}해야 합니다.
        note: "(2)(라) 의사무능력 기각. LEGAL_DB('의사능력 인정', image_462, '계약 유효', image_463)"

  reasons:
    heading: "<이런 결론을 내린 이유>"
    avoid_terms:
      - "이유"
      - "판단"
      - "판단의 요지"
      - "대여"
      - "변제"
      - "채무"
      - "소비대차"
      - "지연손해금"
      - "채무불이행"
      - "부당이득"
      - "손해배상책임"
    placement: "청구·결론 박스 **다음**"
    rules:
      - "판결 '이유' → **'<이런 결론을 내린 이유>'**"
      - "**4단 구조**(현행 판결 관행): ① **기초사실** ② **당사자 주장** ③ **판단** ④ **결론**"
      - "당사자는 **③ 판단**에 가장 관심 → **판단·결론은 상세**, ①②는 **축약** (쟁점 아니면)"
      - "**용어 치환**: 대여→**빌려주었다** / 변제→**갚다** / 채무→**빚** / 지연손해금→**이자**"
      - "  · **계약** → **약속**(이해 어려울 때) — '약속을 지키지 않음' / 계약 이해 가능하면 **계약** 사용"
      - "  · **채무불이행·손해배상** → 약속 안 지킴 → **손해** → **돈으로 환산**"
      - "  · **부당이득** → 일했는데 **임금 안 받음** → 받을 **돈**"
      - "  · **불법행위·위자료** → 때림·괴롭힘 → **마음이 힘들고 괴로움** → **위자료*** (*마음 아프게 한 것 때문에 주는 돈*)"
      - "  · **임대차** → **집 빌려줌** / **임대보증금*** (*이사 갈 때 돌려받는 돈*) / **임대기간** 지나면 **나가야**"
      - "금액 계산: **빼기**로 보여주기 (예: 2억 − 5천만 = 1억 5천만 **남음**)"
      - "복잡한 논증·법조문·요건사실 나열은 **생략·축약**"
      - "쟁점별: '{쟁점} → {법원 결론}' / 주장: '{당사자}는 ○○라 했지만, 법원은 △△'"
      - "주문·인용 형식은 `acceptance_judgment` · 청구는 `claim_and_conclusion` · **항변**은 `defenses` 참고"
    phrase_rules:
      - match: ["대여", "차용", "빌려"]
        write: "{원고}는 {피고}한테 {금액}을 **빌려주었습니다**."
        note: "① 기초사실 — 대여. LEGAL_DB('대여하였다', image_402)"
      - match: ["변제", "갚", "상환"]
        write: "{피고}는 {원고}한테 {금액}을 **갚았습니다**."
        note: "① 기초사실 — 변제. LEGAL_DB('채무를 변제', image_401)"
      - match: ["잔액", "남", "빼"]
        write: |
          {원고}이 빌려준 {총액}에서 이미 갚은 {변제액}을 빼고 나면, {잔액}이 남습니다.
        note: "① 기초사실 — 잔액 계산 (빼기)"
      - match: ["갚아야", "인용", "대여금"]
        write: |
          {번호}. {피고}는 {원고}에게 빌린 돈을 갚아야 합니다.
          따라서 {피고}는 {원고}에게 남은 돈 {잔액}을 갚아야 합니다.
          돈을 늦게 주면, 늦은 만큼 **이자**를 붙여서 같이 줘야 합니다.
        note: "(1)(가) 금전청구 — ③④ 판단·결론"
      - match: ["채무불이행", "손해배상", "매매", "약속"]
        write: |
          1) {피고}는 {원고}에게 {물건·행위}을 **약속**했습니다. ({계약} 이해 가능하면 '계약' 사용)
          2) 그러나 {피고}는 **약속을 지키지 않았습니다**.
          3) 그래서 {원고}는 **손해**를 입었습니다. 돈으로 계산하면 {금액}입니다.
          4) 따라서 {피고}는 {원고}에게 {금액}을 줍니다. 늦게 주면 **이자**를 더 붙여 줍니다.
        note: "(1)(나) 채무불이행 손해배상. LEGAL_DB('채무불이행', image_388) 매칭 시 DB 우선"
      - match: ["부당이득", "임금", "근로", "염전"]
        write: |
          1) {원고}는 {피고} 시키대로 {장소}에서 일했습니다. ({기간} 동안)
          2) {원고}는 {피고}에게 **임금을 받지 못했습니다**.
          3) {피고}는 임금을 주겠다고 **약속한 적 없습니다**.
          4) 그러나 {원고}는 일한 기간 × 월 {금액}으로 **받을 수 있습니다**. (이유 ①②③)
          5) 일한 대가로 받을 돈은 이자 포함 **약 {총액}**입니다.
        note: "(1)(다) 부당이득반환·무임금. LEGAL_DB(염전 image_370·371, 무임금 image_374) 참고"
      - match: ["불법행위", "위자료", "학대", "때리", "괴롭"]
        write: |
          {번호}. {원고}는 **위자료*** {금액}을 받을 수 있습니다.
          (*위자료: 마음을 힘들고 괴롭게 한 것 때문에 주는 돈)
          1) {원고}는 {장애 등}입니다.
          2) {피고}는 {기간} 동안 {원고}를 때리고 괴롭혔습니다. ({구체 행위})
          3) 그래서 {원고}는 **마음이 힘들고 괴로웠습니다**.
          4) {원고}의 위자료는 {금액}입니다.
        note: "(1)(라) 불법행위 손해배상. LEGAL_DB(학대 image_3253, 위자료 image_468, 정신적 피해 image_362)"
      - match: ["임대", "임대기간", "보증금", "퇴거"]
        write: |
          1) {임대인}은 {임차인}에게 {장소}를 **빌려주었습니다**.
          2) 약속은 두 가지입니다.
             ① **빌린 기간**: {시작}부터 {종료}까지
             ② **임대보증금***: {금액} (*이사 나갈 때 돌려받는 돈*)
          {번호}. 지금은 {종료}가 **지났습니다**. {임차인}은 **당장** 이사 나가고, {호수}를 돌려줘야 합니다.
        note: "(1)(마) 부동산 인도·임대만료. LEGAL_DB(임대계약 image_365, 임대기간 image_366, 퇴거 image_364)"
      - match: ["쟁점", "주장"]
        write: |
          {번호}. {쟁점을 쉬운 질문으로}
          · {원고/피고} 주장: {쉬운 말}
          · 법원: {결론}
        note: "쟁점별 판단"
      - match: ["과실상계", "과실"]
        write: |
          {피고}가 줄 돈을 정할 때, {원고}가 **잘못한 만큼**을 **뺍니다**.
        note: "손해배상액 산정. LEGAL_DB('과실상계', image_328·329) 매칭 시 DB 우선"

  misc_expressions:
    heading: "<기타 표현 (용어 설명)>"
    avoid_terms:
      - "통정허위표시"
      - "가장행위"
      - "과실상계"
    rules:
      - "**(3) 기타 표현** — 판결서에 자주 나오는 **법률 용어**를 **짧게 설명** (별도 판결 단락이 아니어도 이유·판단 중 등장 시 적용)"
      - "용어가 나오면 **한두 문장**으로 풀어 쓰고, 가능하면 **그림·비유**(지분·전원 동의·단체 회의·빼기) 활용"
      - "**(가) 공유·합유·총유** — '함께 가짐'은 같지만 **팔 수 있는 방법**이 다름"
      - "  · **공유**: 각자 **지분**(예: 1/4, 2/4) → **자기 몫만** 마음대로 팔 수 있음"
      - "  · **합유**: **모든 주인**이 **허락**해야 팔 수 있음"
      - "  · **총유**: **단체**가 주인 → **정식 회의**로 팔기로 **결정**해야 팔 수 있음"
      - "**(나) 가장행위(통정허위표시)**: 상대방과 **짜고 만든 가짜 계약** → **무효**"
      - "**(다) 과실상계**: {피고}가 줄 돈 정할 때 {원고} **잘못한 만큼 빼기** (파이에서 조각 빼기)"
      - "금액·지분은 **숫자·빼기**로 보여주기"
    phrase_rules:
      - match: ["공유", "지분"]
        write: |
          {인원}명이 {물건}을 **함께** 가지고 있습니다.
          {이름}이 가진 것은 {지분}입니다. …
          **각자 자기 몫만** 마음대로 팔 수 있습니다.
        note: "(3)(가) 공유. LEGAL_DB('공유', image_349)"
      - match: ["합유"]
        write: |
          {인원}명이 {물건}을 **함께** 가지고 있습니다.
          이 {물건}을 **팔려면** {인원}명 **모두 허락**해야 합니다.
        note: "(3)(가) 합유. LEGAL_DB('합유', image_350)"
      - match: ["총유"]
        write: |
          {단체명}이 이 {물건}을 가지고 있습니다.
          {단체} 사람들이 **모여 정식으로 회의**해야만 이 {물건}을 팔 수 있습니다.
        note: "(3)(가) 총유. LEGAL_DB('총유', image_351)"
      - match: ["가장행위", "통정허위", "통정허위표시", "허위표시"]
        write: |
          상대방과 **가짜로** 한 **계약**은 **무효**입니다.
        note: "(3)(나) 통정허위표시. LEGAL_DB('통정허위', image_353)"
      - match: ["과실상계"]
        write: |
          {피고}가 줄 돈을 정할 때, {원고}가 **잘못한 만큼**을 **뺍니다**.
        note: "(3)(다) 과실상계. LEGAL_DB('과실상계', image_328·329)"

examples:
  - id: claim_building_delivery
    label: "(1) 청구취지 — 건물 인도청구"
    source: |
      청구취지
      피고는 원고에게 ○○아파트 ○○동 304호에서 퇴거하고,
      위 304호를 원고에게 인도하라.
    easy_read: |
      <이 소송에서 김OO가 요구하는 것>
      김OO는 이ㅁㅁ에게 이렇게 요구합니다.
      "○○아파트 ○○동 304호에서 나가고, 304호를 돌려주세요!"
    note: "LEGAL_DB('부동산 명도', image_325) 매칭 시 DB 우선"

  - id: claim_alimony_damages
    label: "(1) 청구취지 — 위자료"
