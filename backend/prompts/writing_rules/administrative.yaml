# 행정판결 — 이지리드 작성 규칙
# 가이드북 IV. 가사판결서 등 및 행정판결서
#   1. 기재사항 — 행정소송법 제8조 제2항: **민사판결서 형식** 준용
#   2. 작성례(부록 4) — 장애등록 **등급외결정** 취소소송 **기각**
# 상세 청구·주문·이유는 `civil.yaml`을 **기본**으로 따르고, 아래 **행정 특유** 규칙을 추가 적용

doc_type: administrative
section_label: "행정판결"

section_order:
  - overview
  - claim_and_conclusion
  - reasons
  - conclusion

sections:
  overview:
    heading: "<행정판결 이지리드 — 작성 요점>"
    rules:
      - "행정소송법 **제8조 제2항** — 행정판결 정본은 **민사판결서와 같은 형식**"
      - "**민사 이지리드 규칙(`civil.yaml`)을 기본** 적용: 청구·결론 박스, 4단 이유, 용어 치환"
      - "행정은 **행정청(정부·시청 등)의 처분** vs **국민(원고)** — '**처분**' → **결정·판정**"
      - "**취소소송**: 원고는 처분이 **잘못됐다**고 함 → 법원이 **취소** 또는 **유지(기각)**"
      - "**피고** = **행정청**(시장·구청·장애인복지법 시행령상 기관 등)"
      - "**부록 4 작성례**: **뇌병변장애** 미성년자 **장애등록** 신청 → **등급외결정** → 취소소송 **청구기각**"
      - "장애등록: **장애인 등록** — 장애 수준에 따라 **등급** 또는 **등급 밖(등급외)** 결정"
    phrase_rules: []

  claim_and_conclusion:
    heading: "<청구취지와 주문(결론)>"
    avoid_terms:
      - "주문"
      - "청구취지"
      - "처분"
      - "행정처분"
      - "등급외결정"
      - "무효"
    placement: "이유 부분 **맨 앞**"
    rules:
      - "제목: **'<김OO가 원하는 것>'** / **'<이 판결의 결론>'**"
      - "**취소 청구**: '{시장}이 한 **○○ 결정**을 **취소**해 달라' → 쉬운 말로"
      - "**인용(취소)**: '**잘못된 결정**을 **취소**합니다' / '**장애 등록**을 **인정**합니다'"
      - "**기각(유지)**: '요구를 **받아주지 않습니다**' / '{시장}의 결정을 **그대로** 둡니다'"
      - "**등급외결정**: '**장애 등록을 받을 수 없다**' / '**등급에 해당하지 않는다**'"
      - "민사와 동일: '원고가 졌습니다' ❌ → '**받아주지 않습니다**' / '**결정을 그대로**'"
    phrase_rules:
      - match: ["장애등록", "장애인 등록"]
        write: |
          {원고}는 **장애인 등록**을 **신청**했습니다.
        note: "기초사실. LEGAL_DB('장애등록 신청', image_657)"
      - match: ["등급외", "등급 외", "미해당"]
        write: |
          {행정청}은 **장애 등록을 받아줄 수 없다**고 **결정**했습니다.
          (*등급에 해당하지 않음 — **등급외**)
        note: "처분 내용. LEGAL_DB('등급 외 결정', image_658)"
      - match: ["취소한다", "처분 취소"]
        write: |
          {행정청}이 한 **{처분}**을 **취소**합니다.
          {원고}의 **장애 등록**을 **인정**합니다.
        note: "주문 — 취소. LEGAL_DB('장애등록 취소처분 취소', image_656 근처)"
      - match: ["기각", "유지", "각하"]
        write: |
          김OO의 요구를 **받아주지 않습니다**.
          {행정청}의 **결정을 그대로** 둡니다.
        note: "주문 — 기각·처분유지. LEGAL_DB('행정처분 유지', image_656, '청구 기각' civil image_002)"

  reasons:
    heading: "<이런 결론을 내린 이유>"
    avoid_terms:
      - "처분"
      - "행정행위"
      - "재량"
    placement: "청구·결론 박스 **다음**"
    rules:
      - "`civil.yaml` **4단 구조** — ① 신청·처분 사실 ② 원고 주장 ③ 법원 판단 ④ 결론"
      - "**장애등록**: **진단명**(뇌병변 등)·**기능 평가**·**등급 기준** — 법조문 대신 **'기준에 맞지 않음'**"
      - "원고: '**장애가 있다**' / 행정청·법원: '**등록 기준에 해당하지 않음**'"
      - "복잡한 **의학·법리**는 축약 — **핵심: 등록 기준 충족 여부**"
      - "기각 시: '**잘못되지 않았다**' / '**기준에 맞지 않아** 결정이 **맞다**'"
    phrase_rules:
      - match: ["뇌병변", "장애"]
        write: |
          {원고}는 **{진단}** 진단을 받았습니다.
          {행정청}은 **장애 등록 기준**을 보고 **등록할 수 없다**고 했습니다.
        note: "부록 4 — 뇌병변장애 등급외"
      - match: ["위법", "재량", "하자"]
        write: |
          {원고}는 {행정청}의 결정이 **잘못됐다**고 합니다.
          법원: {행정청}의 결정은 **법과 기준에 맞습니다**. **취소할 이유가 없습니다**.
        note: "취소소송 판단"

  conclusion:
    heading: "<이 판결의 결론>"
    avoid_terms: ["주문"]
    rules:
      - "**행정청 결정 유지** vs **취소**를 **한 문장**으로 명확히"
      - "장애등록: '**등록을 받을 수 없다**는 결정 **그대로**' vs '**등록을 인정**'"

examples:
  - id: admin_disability_grade_excluded_dismissed
    label: "부록 4 — 장애등록 등급외결정 취소소송 (청구기각)"
    source: |
      청구취지
      피고가 원고에게 한 2024. 3. 15.자 장애등급외 결정을 취소한다.
      주문
      원고의 청구를 기각한다.
      소송비용은 원고가 부담한다.
    easy_read: |
      <김OO가 원하는 것>
      김OO은 **뇌병변장애**로 **장애인 등록**을 신청했습니다.
      ○○시장이 **등록을 받아줄 수 없다**고 했습니다.
      김OO은 이 **결정을 취소**하고 **등록**받고 싶습니다.

      <이 판결의 결론>
      김OO의 요구를 **받아주지 않습니다**.
      ○○시장의 **'장애 등록 불가'** 결정을 **그대로** 둡니다.
      **소송비용**은 김OO이 **내야** 합니다.

      <이런 결론을 내린 이유>
      1) 김OO은 **뇌병변장애** 진단을 받고 **장애 등록**을 신청했습니다.
      2) ○○시장은 **등록 기준**을 보고 **등급에 해당하지 않는다**고 **등급외**로 결정했습니다.
      3) 김OO은 결정이 **잘못됐다**고 했지만, **등록 기준에 맞지 않아** 결정은 **맞습니다**.
      4) 따라서 **취소할 수 없습니다**.
    note: |
      부록 4 유형. LEGAL_DB(장애등록 image_657, 등급외 image_658, 청구기각 image_002, 처분유지 image_656) 매칭 시 DB 우선.
