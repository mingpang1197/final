# 가사판결 — 이지리드 작성 규칙
# 가이드북 IV. 가사판결서 등 및 행정판결서
#   1. 기재사항 — 가사소송법 제12조: **민사판결서에 준하여** 작성 (표현·이유 구조는 civil.yaml 참고)
#   2. 작성례(별책 부록 3-1~3-3) — 이혼·양육·친권상실·가사비송 결정
#   ※ 이지리드 **맨 앞 소제목 순서만은 형사와 동일** (결론 → 이유). 민사·행정 청구 블록을 맨 앞에 두지 않음

doc_type: family
section_label: "가사판결"

section_order:
  - overview
  - claim_and_conclusion
  - reasons
  - conclusion

sections:
  overview:
    heading: "<가사판결 이지리드 — 작성 요점>"
    rules:
      - "**출력 금지**: 이 overview 제목은 본문에 쓰지 않음. 첫 줄부터 `<이 판결의 결론>`"
      - "가사소송법 **제12조** — 가사판결서는 **민사판결서에 준하여** 작성. 이지리드에 기재할 사항·부분별 설명은 **민사 이지리드(`civil.yaml`)** 를 참고"
      - "다만 이지리드 **맨 앞 소제목 순서는 형사와 동일**: `<이 판결의 결론>` → `<이런 결론을 내린 이유>` (`<이 소송에서 …>`·`<{원고}가 원하는 것>` 등 **민사 청구 블록을 맨 앞에 두지 않음**)"
      - "청구·양육·이혼 요구 내용은 **결론·이유·가사 소제목** 안에 녹여 기재"
      - "가사는 **가족·혼인·자녀** 중심 → **이혼·양육·친권·위자료·재산분할**을 쉬운 말로"
      - "**사건본인** → **아이** / **미성년자** (판결문의 '사건본인'은 아이를 가리킴)"
      - "**친권*** → 부모가 아이를 **돌보고 키울 권리와 책임** (*필요 시 짧은 설명*)"
      - "**양육** → 아이와 **함께 살면서 키우는 것** / **양육자** → **키우는 사람**"
      - "**이혼** → **결혼을 없던 일로 함** → 더 이상 **법적으로 부부가 아님**"
      - "가사비송 **라류·마류**가 이혼 등과 **결합**되어 **판결**로 종결되는 경우, 또는 가사비송 **결정서**를 이지리드로 제공할 필요가 있는 경우에도 동일 형식·작성례 참고"
      - "**부록 3 작성례** (별책 부록 3-1~3-3, 상세는 examples):"
      - "  ① **부록 3-1**: 베트남인 원고가 **청각장애인** 피고를 상대로 **이혼** 청구 + 미성년 사건본인 **양육자 지정** → **전부 인용**"
      - "  ② **부록 3-2**: 원고가 청각장애인 피고를 상대로 **이혼·위자료·재산분할** 청구 → **일부 인용**"
      - "  ③ **부록 3-3**: 검사가 미성년 사건본인에 대한 **친권상실**을 청구하여 **인용** (가사비송 결정서 작성례 포함)"
    phrase_rules: []

  claim_and_conclusion:
    heading: "<청구취지와 주문(결론)>"
    avoid_terms:
      - "주문"
      - "청구취지"
      - "사건본인"
      - "친권자"
      - "양육자"
      - "친권상실"
    placement: "문서 **맨 앞은 `<이 판결의 결론>`만**. 청구 내용은 결론·이유에 포함 (민사처럼 청구 소제목을 앞에 두지 않음)"
    rules:
      - "첫 소제목은 반드시 **'<이 판결의 결론>'**. 이혼·양육·위자료·재산·친권 결과를 **한눈에**"
      - "민사 `civil.yaml`의 표현·인용·기각 말투는 **참고**하되, **맨 앞 청구 소제목은 쓰지 않음**"
      - "**이혼**: '{원고}과 {피고}은 **이혼**합니다' (= 더 이상 부부 아님)"
      - "**양육·친권**: '아이는 **{양육자}**가 키웁니다' / '**함께** 키웁니다' (공동친권·공동양육)"
      - "**위자료**: '마음 아프게 한 만큼 **○○원**을 줍니다' (*위자료 설명*)"
      - "**재산분할**: '함께 모은 재산·빚을 **나눕니다**' — 누가 무엇을 받는지 **구체적으로**"
      - "**친권상실**: '**부모로서의 권리**를 **빼앗습니다**' / '친권을 **잃습니다**'"
      - "전부·일부 인용·기각 표현은 `civil.yaml` acceptance_judgment·claim_and_conclusion 참고"
      - "일부 인용: **받는 것 / 안 받는 것**을 결론에서 **나눠** 씀"
    phrase_rules:
      - match: ["이혼한다", "이혼"]
        write: |
          {원고}와 {피고}는 **이혼**합니다.
          이혼은 **결혼을 없던 일로 하는 것**입니다. 더 이상 **법적으로 부부가 아닙니다**.
        note: "주문 — 이혼. LEGAL_DB('원고와 피고는 이혼', image_465·466)"
      - match: ["친권자", "양육자", "양육"]
        write: |
          아이의 **양육**은 {양육자}가 맡습니다.
          (*양육: 아이와 함께 살면서 키우는 것*)
        note: "주문 — 양육자. LEGAL_DB('양육자로 원고', image_467 등)"
      - match: ["위자료"]
        write: |
          {피고}는 {원고}에게 **위자료*** {금액}을 줍니다.
          (*위자료: 마음을 아프게 한 것 때문에 주는 돈)
        note: "주문 — 위자료. LEGAL_DB(image_468)"
      - match: ["재산분할", "재산 분할"]
        write: |
          {원고}와 {피고}는 **함께 모은 재산**을 이혼하면서 **나눕니다**.
          {구체 분할 — 아파트·현금·각자 명의 등}
        note: "주문·이유 — 재산분할. LEGAL_DB('재산 분할', image_591·590)"
      - match: ["친권을 상실", "친권상실"]
        write: |
          {당사자}는 아이에 대한 **친권**을 **잃습니다**.
          (*친권: 부모로서 아이를 돌보고 키울 권리와 책임)
        note: "주문 — 친권상실. LEGAL_DB('친권을 상실', image_475)"

  reasons:
    heading: "<이런 결론을 내린 이유>"
    avoid_terms:
      - "혼인파탄"
      - "유책"
      - "사건본인"
    placement: "`<이 판결의 결론>` **다음**"
    rules:
      - "`civil.yaml` reasons **4단 구조** (기초사실 → 주장 → 판단 → 결론) 동일 적용 — 판단(중요 쟁점 1~3개) 중점"
      - "**이혼 이유**: '부부관계가 **돌이킬 수 없을 만큼** 나빠졌다' / '**이혼을 원한다**'"
      - "**양육 판단**: '아이 **복리**' — 누가 키우면 **안전·안정**한지"
      - "**위자료**: 불륜·폭력·유기 등 → **마음이 힘들고 괴로웠다** (`civil.yaml` 불법행위·위자료 참고)"
      - "**재산분할**: 혼인 중 **함께 모은 것** vs **각자 것** 구분, **빼기·나누기**로 설명"
      - "**친권상실**: 아이 **학대·방임·유기** 등 → 부모로서 **맞지 않음**"
      - "청각·난청·언어장애 등 → **대화가 어려웠다**. 외국인 배우자 → **언어·문화** 차이는 **사실만** 간단히"
    phrase_rules:
      - match: ["혼인관계", "파탄", "이혼의사"]
        write: |
          {원고}와 {피고}는 **이혼을 원합니다**.
          {구체 사유 — 싸움·가출·대화 어려움 등}
          부부관계는 **더 이상 좋아지기 어렵습니다**.
        note: "이혼 이유. LEGAL_DB('이혼의사 합치', image_3499 등)"
      - match: ["양육", "복리", "친권"]
        write: |
          아이가 **잘 자라려면** {양육자}가 키우는 것이 **좋습니다**.
          {이유 — 지금까지 키워온 사람·아이와의 관계·환경}
        note: "양육·친권 판단"
      - match: ["친권상실", "학대", "방임"]
        write: |
          {당사자}는 아이를 {학대·방임·유기 등}했습니다.
          **부모로서** 아이를 돌보기 **어렵습니다**. **친권**을 **빼앗아야** 합니다.
        note: "친권상실 이유. LEGAL_DB('친권을 상실', image_475)"

  conclusion:
    heading: "<이 판결의 결론>"
    avoid_terms: ["주문"]
    rules:
      - "주문 전체를 **한눈에** — 이혼·양육·돈·재산 **무엇이 결정됐는지**"
      - "일부 인용이면 **받는 것 / 안 받는 것**을 **나눠** 씀"

examples:
  - id: family_divorce_custody_full
    label: "부록 3-1 — 이혼 + 미성년자 양육 (전부 인용)"
    source: |
      청구취지
      원고와 피고는 이혼한다. 사건본인에 대한 친권자 및 양육자로 원고를 지정한다.
      주문
      원고의 청구를 인용한다.
    easy_read: |
      <이 판결의 결론>
      김○○과 이□□은 **이혼**합니다. (더 이상 부부가 아닙니다.)
      아이는 **김○○**가 **함께 살면서** 책임지고 키웁니다.

      <이런 결론을 내린 이유>
      김○○(베트남인)은 청각장애인인 이□□과 **이혼**하고, 아이 **양육**을 맡길 원했습니다.
      부부관계는 더 이상 좋아지기 어렵습니다.
      아이가 잘 자라려면 **김○○**가 키우는 것이 좋습니다.
    note: |
      베트남 원고 × 청각장애 피고, 양육 전부 인용. LEGAL_DB(이혼 image_465, 양육 image_467).
      형사형 순서: 결론 → 이유 (청구 소제목 맨 앞 ❌).

  - id: family_divorce_alimony_property_partial
    label: "부록 3-2 — 이혼 + 위자료 + 재산분할 (일부 인용)"
    source: |
      청구취지
      원고와 피고는 이혼한다. 피고는 원고에게 위자료 3,000만 원을 지급하라.
      혼인 중 형성된 재산을 분할하라.
      주문
      원고와 피고는 이혼한다. 피고는 원고에게 위자료 1,000만 원을 지급한다.
      재산분할 비율에 따라 피고가 원고에게 차액 5,000만 원을 지급한다.
      원고의 나머지 청구는 기각한다.
    easy_read: |
      <이 판결의 결론>
      · 김○○과 이□□은 **이혼**합니다.
      · 이□□은 김○○에게 **위자료 1,000만 원**을 줍니다. (3,000만 원은 **받지 못함**)
      · **재산**은 나눕니다. 이□□은 김○○에게 **5,000만 원**을 더 줍니다.
      · **나머지 요구**는 **받아주지 않습니다**.

      <이런 결론을 내린 이유>
      김○○은 청각장애인인 이□□을 상대로 이혼·위자료·재산분할을 요구했습니다.
      이혼과 일부 위자료·재산분할은 인정하고, 나머지 금액은 받아주지 않습니다.
    note: |
      일부 인용 — 받는 것/못 받는 것 구분. LEGAL_DB(위자료 image_468, 재산분할 image_591·593).

  - id: family_parental_rights_loss
    label: "부록 3-3 — 미성년자 친권상실 (검사 청구·인용, 결정서 작성례)"
    source: |
      주문
      청구인 ○○○에 대한 친권을 상실한다.
    easy_read: |
      <이 판결의 결론>
      ○○○은 아이에 대한 **친권**을 **잃습니다**.
      (*친권: 부모로서 아이를 돌보고 키울 권리와 책임)

      <이런 결론을 내린 이유>
      검사가 미성년 아이(사건본인)에 대해 ○○○의 **친권상실**을 청구했습니다.
      ○○○은 아이를 {학대·방임 등}했습니다.
      **부모로서** 아이를 돌보기 **어렵습니다**.
    note: "가사비송 결정서 작성례 포함. LEGAL_DB('친권을 상실', image_475)."
