# 이지리드 판결서 — 공통 작성 규칙 (모든 판결 유형 공통)
# 가이드북 체크리스트: 형식적·내용적·참여적 요소 + 작성방법

name: easy_read_style
section_label: "이지리드 공통 작성 규칙"

content:
  words:
    - "법률·전문·한자어 **최소화** — 불가피하면 **바로 앞·뒤**에 쉬운 설명 (각주 ❌, 괄호·한 줄 설명 ✅)"
    - "**추상어 ❌ → 구체어** / **비유·은유 ❌**"
    - "**성인**에게 **유아적** 표현 ❌ — 동등하게 존댓말"
    - "**축약어 ❌** (방위산업청→방사청 등)"
    - "**날짜·시간**: `2023년 2월 17일 오후 8시` — **년·월·일·오전/오후·시·분** 글자 표기 (2023.2.17 ❌)"
    - "**중요 날짜**는 도입부에서 **굵게** 강조"
    - "**금액·숫자**: 아라비아 숫자 + **만·천** 등 글자 단위 (5000000원 → **500만 원**)"
    - "정확한 수치가 필수가 아니면 **대략** (약 500만 원)"
    - "**%, &, $** ❌ → **퍼센트, 그리고, 달러** / 비율은 **100개 중 67개**, **3분의 1** 등"
    - "**반복 OK** — 그·그건 등 **지시·인칭대명사 ❌**, **이름·명칭 반복**"
    - "장황하면 **2~3줄 요약** 후 다시 풀어씀"
  sentences:
    - "**구어체·존댓말** — 말하듯이"
    - "**서술식** (개조식 ❌ — 소제목 아래도 완결된 문장)"
    - "**주어+동사** 짧은 문장, 부사·접속사 최소"
    - "**능동태** (피동·수동 ❌)"
    - "**긍정문** — 부정·**이중부정 ❌**"
    - "과거 사실은 과거, 일반 설명은 **현재**"
    - "**한 문장 = 한 가지 생각 = 동사 하나**"
    - "**한 문장 1줄** 목표, **최대 3줄** — 줄바꿈은 **어절** 단위 (음절 ❌)"
    - "원문 1문장 → 여러 문장으로 나눌 때 **핵심 의미 누락·왜곡 ❌**"
  paragraphs:
    - "**두괄식** — 가장 중요한 정보를 **맨 앞** (결론·주문 이지리드는 이유 **앞**)"
    - "문단 **짧게** — 주제·쟁점별 분리"
    - "**소제목** + 글머리 — 제목만 봐도 내용 파악 (`<이 판결의 결론>` 등)"

format:
  typography:
    - "글꼴 **1~2종** — **맑은 고딕** 등 고딕 계열 (판결서체 ❌)"
    - "본문 **12~14pt**, 제목·강조 **14~20pt** **굵게**"
    - "자간 0%, 장평 100% / **흰 바탕·검정 글**"
    - "기울임·테두리·그림자 ❌"
  layout:
    - "**문서 표지·제목 줄 금지** — `<민사판결 이지리드 — …>` 등 케이스명 표지는 **출력하지 않음**. 첫 줄부터 `<이 판결의 결론>` 등 본문 소제목."
    - "**왼쪽 정렬** (양쪽 정렬 ❌)"
    - "첫 줄 **들여쓰기 ❌**"
    - "오른쪽 **불규칙 여백** 그대로 (강제 양쪽 맞춤 ❌)"
    - "글·그림 **여백** 충분 — 한 페이지 과밀 ❌"
    - "그림은 **관련 글 바로 옆·아래**"
    - "판결서 기본 여백 **250%** 유지"
  volume:
    - "이지리드 **5쪽 이내** 권장, **최대 10쪽**"
  page_numbers:
    - "쪽번호: **「p/q쪽」** (예: 2/5쪽) — **아래 중앙 또는 오른쪽**"

participatory:
  - "당사자 **문해력**에 맞게 (지적·발달장애 등)"
  - "가능하면 완료 전 당사자 **이해 테스트** — 선호 표현 확인"

checklist_categories:
  formal: "형식적 요소"
  content: "내용적 요소"
