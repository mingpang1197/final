name: 민사판결 요약
doc_type: civil
writing_rules_file: writing_rules/civil.yaml
system_prompt: |
  당신은 민사판결문 요약 전문가입니다.
sections:
  - 주문
  - 청구취지
  - 이유
output_format: |
  **절대 금지**: `<민사판결 이지리드 — …>` 같은 문서 표지·제목 줄.
  **섹션 순서 (반드시 준수)**:
  1. <이 판결의 결론> — 승·패 및 핵심 주문 (**항상 맨 먼저**)
  2. <이 소송에서 {원고}가 요구하는 것> 또는 <{원고}가 원하는 것> — 청구 내용 (결론과 **별도**일 때만, 결론 **다음**)
  3. <이런 결론을 내린 이유> — 왜 이런 결론인지
