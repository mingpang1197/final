# ERAI 서비스 사용방안 DB — 챗봇이 서비스 이용법·화면 안내에 참조

overview:
  title: ERAI 서비스 이용 가이드
  items:
    - "공통 이용 방법: ERAI는 판결문을 업로드한 뒤 업로드 → 요약 → 번역 → 시각자료 → 추출 순서로 이지리드 문서를 만드는 서비스입니다."
    - "각 화면 위쪽의 단계 표시를 통해 현재 작업 단계를 확인할 수 있습니다."
    - "오른쪽 아래의 챗봇 버튼을 누르면 대화창이 열립니다."
    - "챗봇에는 서비스 이용 방법, 법률용어의 쉬운 뜻, 현재 작업 중인 판결문에 관해 질문할 수 있습니다."
    - "챗봇은 사용자의 화면을 직접 보거나 버튼을 대신 누를 수 없습니다. 사용자가 현재 보고 있는 페이지나 오류 내용을 함께 알려주면 더 정확하게 안내할 수 있습니다."
    - "AI가 만든 요약문, 번역문과 시각자료는 반드시 원 판결문과 비교하여 확인해야 합니다."
    - "최종 문서를 추출하기 전에 날짜, 금액, 형량, 사람 이름과 판결 결론이 정확한지 확인해야 합니다."

sections:
  - id: login_projects
    title: 로그인과 기존 프로젝트
    keywords: [로그인, 기존 프로젝트, 저장, 계정, 프로젝트 목록]
    items:
      - "로그인한 사용자는 자신이 이전에 작업한 프로젝트를 업로드 페이지의 기존 프로젝트 대시보드에서 확인할 수 있습니다."
      - "다른 계정으로 로그인하면 해당 계정에 저장된 프로젝트만 표시될 수 있습니다."
      - "예전에 올린 판결문, 이전에 작업한 문서, 과거 프로젝트는 모두 기존 프로젝트 대시보드에서 찾습니다."
      - "기존 프로젝트에서는 원문, 요약문, 번역문과 최종본의 생성 여부를 확인할 수 있습니다."
      - "사용자는 각 자료 옆의 열기 버튼을 눌러 내용을 확인할 수 있습니다."

  - id: upload
    title: "1. 업로드 페이지"
    keywords: [업로드, Browse Files, 사건 유형, PDF, Word, 파일]
    items:
      - "Browse Files 버튼을 누르거나 업로드 영역에 파일을 넣어 판결문 PDF 또는 Word 파일을 선택할 수 있습니다."
      - "업로드 버튼을 누르면 AI가 판결문에서 글자를 추출하고 사건번호와 내용을 참고하여 사건 유형을 자동 추정합니다."
      - "사건 유형 선택 팝업이 나타나면 사용자는 형사·민사·가사·행정 중 올바른 유형을 직접 확인하고 선택해야 합니다."
      - "AI가 추정한 사건 유형이 틀릴 수 있으므로 사건번호와 판결문 내용을 보고 다시 확인해야 합니다."
      - "사건 유형을 선택하면 요약 단계로 이동할 수 있습니다."
    subsections:
      - title: 기존 프로젝트 확인
        items:
          - "업로드 페이지 하단의 기존 프로젝트 대시보드에서 이전 작업을 확인할 수 있습니다."
          - "이전에 첨부한 판결문의 원문을 보려면 해당 프로젝트의 원문 열기 버튼을 누릅니다."
          - "이전에 만든 요약문을 보려면 요약문 열기 버튼을 누릅니다."
          - "이전에 만든 번역문을 보려면 번역문 열기 버튼을 누릅니다."
          - "이전에 만든 최종 이지리드 문서를 보려면 최종본 열기 버튼을 누릅니다."
      - title: 기존 프로젝트 상태
        items:
          - "원문 완료는 판결문 파일이 업로드되었다는 뜻입니다."
          - "요약문 완료는 판결문의 핵심 내용을 정리한 요약문이 생성되었다는 뜻입니다."
          - "번역문 완료는 요약문을 쉬운 문장으로 바꾼 결과가 생성되었다는 뜻입니다."
          - "최종본 완료는 시각자료 배치와 최종 문서 생성이 완료되었다는 뜻입니다."

  - id: summary
    title: "2. 요약 페이지"
    keywords: [요약, 원문, AI 프롬프트, 편집]
    items:
      - "왼쪽 화면에는 사용자가 첨부한 판결문 원문이 표시됩니다."
      - "오른쪽 화면에는 선택한 사건 유형에 맞게 AI가 생성한 요약문이 표시됩니다."
      - "사용자는 원문과 요약문을 비교하면서 내용이 정확한지 확인해야 합니다."
      - "오른쪽 편집 영역에서 요약문 내용을 직접 추가하거나 삭제할 수 있습니다."
      - "글자 크기와 강조 여부도 직접 수정할 수 있습니다."
      - "AI 프롬프트 입력창에 수정 요청을 입력하여 요약문을 다시 다듬을 수 있습니다."

  - id: translate
    title: "3. 번역 페이지"
    keywords: [번역, 이지리드, 쉬운 문장, 편집]
    items:
      - "왼쪽 화면에는 앞 단계에서 확정한 요약문이 표시됩니다."
      - "오른쪽 화면에는 요약문을 쉬운 문장으로 바꾼 이지리드 번역문이 표시됩니다."
      - "사용자는 요약문과 번역문을 비교하여 원래 의미가 바뀌지 않았는지 확인해야 합니다."
      - "오른쪽 편집 영역에서 번역문 내용을 직접 수정할 수 있습니다."
      - "글자 크기와 강조 여부도 직접 수정할 수 있습니다."
      - "번역문 왼쪽의 노란색 시각자료 영역은 최종 이지리드에서 그림이 배치될 위치를 미리 보여줍니다."

  - id: images
    title: "4. 시각자료 페이지"
    keywords: [그림, 시각자료, 이미지, 배치, 드래그]
    items:
      - "왼쪽 화면에는 번역문과 시각자료가 배치될 위치가 표시됩니다."
      - "오른쪽 화면에는 ERAI에 저장된 시각자료 목록이 표시됩니다."
      - "Solar AI는 각 문장이나 항목의 의미를 참고하여 관련 시각자료를 자동으로 추천하고 배치합니다."
      - "자동으로 배치된 그림이 문장 의미와 다르면 사용자가 직접 변경해야 합니다."
      - "사용자는 오른쪽 시각자료 목록의 그림을 끌어서 원하는 위치에 배치할 수 있습니다."
      - "AI 프롬프트에 `무죄와 관련된 그림을 찾아줘`, `징역을 설명하는 그림을 찾아줘`처럼 원하는 의미를 구체적으로 입력할 수 있습니다."

  - id: export
    title: "5. 추출 페이지"
    keywords: [추출, PDF, Word, 다운로드, 미리보기]
    items:
      - "추출 페이지에서는 완성된 이지리드 문서를 PDF 형태의 미리보기로 확인할 수 있습니다."
      - "화면 하단에는 PDF 추출하기, Word 추출하기, 업로드 화면으로 돌아가기 버튼이 있습니다."
      - "PDF 추출하기: 현재 미리보기와 같은 형태의 이지리드 문서를 PDF 파일로 다운로드합니다."
      - "Word 추출하기: 내용을 복사하거나 다시 편집하기 쉬운 Word 파일로 다운로드합니다."
      - "업로드 화면으로 돌아가기: 업로드 페이지로 이동합니다."

faq:
  - triggers: [예전에 올린 판결문, 이전 파일, 과거 프로젝트, 예전 문서]
    answer: "업로드 페이지 하단의 **기존 프로젝트 대시보드**에서 이전에 작업한 판결문과 결과를 확인할 수 있습니다."
  - triggers: [원문은 어디, 원문 열기, 원문 보]
    answer: "업로드 페이지 하단 **기존 프로젝트 대시보드**에서 해당 프로젝트의 **원문 열기** 버튼을 누르세요."
  - triggers: [요약문은 어디, 요약문 열기, 요약 보]
    answer: "업로드 페이지 하단 **기존 프로젝트 대시보드**에서 해당 프로젝트의 **요약문 열기** 버튼을 누르세요."
  - triggers: [번역문은 어디, 번역문 열기, 번역 보]
    answer: "업로드 페이지 하단 **기존 프로젝트 대시보드**에서 해당 프로젝트의 **번역문 열기** 버튼을 누르세요."
  - triggers: [최종본은 어디, 최종본 열기, 최종본 보]
    answer: "업로드 페이지 하단 **기존 프로젝트 대시보드**에서 해당 프로젝트의 **최종본 열기** 버튼을 누르세요."
  - triggers: [사건 유형이 잘못, 사건유형 틀]
    answer: "사건 유형 선택 화면에서 형사·민사·가사·행정 중 올바른 유형을 다시 확인하고 선택하세요."
  - triggers: [그림을 바꾸, 그림 변경, 이미지 바꾸]
    answer: "시각자료 페이지에서 오른쪽 그림 목록의 그림을 원하는 위치로 끌어 배치하세요."
  - triggers: [PDF와 Word 차이, PDF Word 차이]
    answer: "PDF는 최종 모양 유지에 적합하고, Word는 추가 편집과 재사용에 적합합니다."

quick_replies:
  - id: past_documents
    triggers: [원문, 이전, 저장된문서, 저장된문서함, 내작업기록, 기존프로젝트, 기록, 히스토리, 업로드기록, 내문서함, 예전, 과거]
    service_intent: [어디, 보, 찾, 열, 확인, 어떻게, 방법, 위치]
    reply: >
      이전에 첨부한 판결문의 원문은 **업로드 페이지 하단의 기존 프로젝트 대시보드**에서 확인할 수 있습니다.
      해당 항목의 **원문 열기** 버튼을 누르면 됩니다.
      요약문, 번역문, 최종본도 모두 같은 **기존 프로젝트 대시보드**에서 확인할 수 있습니다.
      `내 문서함`, `업로드 기록`, `기록`, `히스토리` 같은 메뉴는 안내하지 않습니다.

  - id: past_results
    triggers: [요약문, 번역문, 최종본, 결과, 문서]
    service_intent: [어디, 보, 찾, 열, 확인, 이전, 예전, 과거]
    reply: >
      이전에 첨부한 판결문의 요약문, 번역문, 최종본은 **업로드 페이지 하단의 기존 프로젝트 대시보드**에서 확인할 수 있습니다.
      현재 새로 첨부한 문서가 아니더라도, 예전에 작업한 문서의 결과도 그곳에서 찾으면 됩니다.
      다른 상단 메뉴를 안내하지 말고, 항상 **기존 프로젝트 대시보드**를 먼저 안내합니다.

  - id: general_usage
    triggers: [사용법, 이용방법, 사용방법, 어떻게 써, 어떻게 사용, ERAI, 서비스]
    reply: >
      서비스 이용 방법은 **업로드 페이지 하단의 기존 프로젝트 대시보드**를 먼저 확인해 주세요.
      이곳에서 이전에 첨부한 판결문의 원문, 요약문, 번역문, 최종본을 볼 수 있습니다.
      별도 상단 메뉴 이름을 추측해서 안내하지 않습니다.

service_help_keywords:
  - 사용법
  - 이용방법
  - 사용방법
  - 어떻게
  - 버튼
  - 화면
  - 페이지
  - 메뉴
  - 대시보드
  - 업로드
  - 추출
  - 로그인
  - 프로젝트

page_contexts:
  "/":
    screen: 업로드 페이지
    lines:
      - "주요 구성: 파일 업로드 카드, 사건 유형 선택 팝업, 기존 프로젝트 목록, 상단 저장소 관리 링크(관리자만)."
      - "버튼/동작: Browse Files로 파일 선택, 업로드로 사건 유형 팝업 열기와 업로드 진행, 사건 유형 버튼으로 민사·형사·가정·행정 선택, 팝업의 취소/업로드로 닫기 또는 확정."
      - "기능: 파일을 드래그하거나 선택해 새 프로젝트를 시작하고, 기존 프로젝트에서 이전 문서를 열거나 삭제할 수 있습니다."

  "*summary*":
    screen: 요약 페이지
    lines:
      - "주요 구성: 왼쪽 원문 미리보기, 오른쪽 요약문 편집 영역, 상단 파일명 표시, 하단 AI 프롬프트 입력 바."
      - "버튼/동작: PageNavigator의 왼쪽/오른쪽 화살표로 원문 페이지 이동, AI 프롬프트 입력 후 화살표 버튼 또는 Enter로 요약 수정 요청, 요약은 수정 후 자동 저장."
      - "기능: 원문을 보면서 요약을 생성하거나 다시 다듬을 수 있습니다."

  "*translate*":
    screen: 번역 페이지
    lines:
      - "주요 구성: 왼쪽 요약문, 오른쪽 이지리드 번역문 편집 영역, 하단 AI 프롬프트 입력 바."
      - "버튼/동작: AI 프롬프트의 화살표 버튼 또는 Enter로 번역문 AI 수정 요청, 편집기 툴바의 되돌리기/다시 실행/굵게/글자 크기 버튼으로 본문 서식 조정."
      - "기능: 요약을 확인하면서 이지리드 번역을 직접 편집하고 자동 저장할 수 있습니다."

  "*images*":
    screen: 시각자료 페이지
    lines:
      - "주요 구성: 왼쪽 번역문, 오른쪽 그림 DB 검색/목록, 하단 그림 검색 프롬프트."
      - "버튼/동작: 그림 DB 검색창으로 제목/파일명 검색, 카드 드래그로 번역문 항목에 그림 배치, 배치된 그림의 X 버튼으로 삭제, 그림 검색 프롬프트의 화살표 버튼 또는 Enter로 웹 그림 검색."
      - "기능: 번역문 각 항목에 맞는 이미지를 찾고 배치하거나 제거할 수 있습니다."

  "*export*":
    screen: 추출 페이지
    lines:
      - "주요 구성: 최종 PDF/Word 미리보기, 하단 추출 버튼 3개."
      - "버튼/동작: PDF 추출하기로 PDF 다운로드, Word 추출하기로 DOCX 다운로드, 업로드 화면으로 돌아가기로 처음 화면 복귀."
      - "기능: 완성된 이지리드를 확인한 뒤 필요한 형식으로 내보냅니다."

  "/admin/storage":
    screen: 관리자 저장소 페이지
    lines:
